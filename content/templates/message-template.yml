# === Divine Love Message Metadata (TEMPLATE) ===
# Save this file as: /messages/YYYY/ID.yml
# Where message_id follows: YYYY-MM-DD-{medium_initials}-{spirit_id}{-2|-3|...}
# - medium_initials: first letters of medium's first & last names, always lowercase (e.g., Al Fike → af)
# - Anonymous mediums: use 'xx' as medium_initials (e.g., 2015-01-05-xx-jesus)
# - spirit_id: corresponds to the spirit file name, always lowercase (e.g., john-the-beloved)
# - Use -2, -3, ... if multiple messages from the same spirit/medium on the same day

message_id: 2025-01-01-af-spirit-id   # REQUIRED. Pattern: YYYY-MM-DD-{medium_initials}-{spirit_id} — always fully lowercase

title: "Your Curated Title Here"       # REQUIRED. Always wrap in double quotes. If curator-supplied (not original), append an asterisk, e.g., "Title Here*"

date: 2025-01-01                       # REQUIRED. ISO date (YYYY-MM-DD) the message was received.

spirit_name: Spirit Name               # REQUIRED. Full name, standard capitalization (e.g., "John the Beloved").

spirit_id: spirit-id                   # REQUIRED. Spirit identifier matching the spirit file name exactly, always lowercase (e.g., john-the-beloved)

medium: Firstname Lastname             # REQUIRED. Full name of the human medium (e.g., "Al Fike").

location:                              # REQUIRED object; city is required, region/country optional.
  city: City Name                      # e.g., "Gibsons"
  region:                              # OPTIONAL. e.g., "BC" (leave blank if none)
  country:                             # OPTIONAL. e.g., "Canada" (leave blank if none)

gathering:                             # OPTIONAL. Name of retreat or event. Leave blank for regular prayer circles. e.g., "August 2015 Gibsons Retreat"

message_type: ["Guidance"]             # REQUIRED. Exactly one of: Blessing, Guidance, Teaching.

description: >                         # REQUIRED. 1-2 sentence curator summary (max ~600 chars).
  One or two sentences describing the heart of this message, its emphasis, and intended comfort or instruction.

primary_subjects: Main Subject         # REQUIRED. Exactly one subject from subjects.yml at any level of the hierarchy.

secondary_subjects:                    # OPTIONAL. Up to five subjects from any level of the hierarchy.
  # - Another Subject
  # - Optional Second Subject

people: []                             # OPTIONAL. Living people mentioned (exclude the medium). e.g., ["James Padgett"]
spirits: []                            # OPTIONAL. spirit_id values of other spirits who appear in the message. e.g., ["john-the-beloved", "mary"]

keywords: []                           # OPTIONAL. Free-form topical tags in bracket format. e.g., ["fear", "trust", "protection"]

questions:                             # RECOMMENDED. Natural language questions a seeker might search for.
  - "How does Divine Love change the soul?"
  - "Can any soul be redeemed?"

related_messages: []                   # OPTIONAL. Subject connections only — never date or proximity. Always fully lowercase. e.g., ["2015-10-12-af-mary"]

audio_url: ""                          # OPTIONAL. Link to audio recording (MP3/stream).
canonical_url: ""                      # OPTIONAL. Permanent external URL where message is published. Leave blank if not publicly posted online.

notes: ""                              # OPTIONAL. Curator notes, context, or provenance.

essential_teachings: []               # OPTIONAL. Use sparingly. Values: "Core Teaching", "Prophecy", "Historical", "Divine Healing", "Spirit Biography", "Milestone"

language: en                           # REQUIRED. Language code (ISO 639-1). Default is "en" for English.

excerpt: >                             # OPTIONAL. Short pull quote or highlight. Aim for under 200 characters.
  Evocative pull quote from the message text.

door: >                                # OPTIONAL. Single sentence distilling the transformative insight. Max 300 characters. No em dashes.
  The door sentence goes here.

collections: []                        # OPTIONAL. Thematic collections. Values: "Mind & Soul", "Two Paths", "Awakening Humanity", "Healing Path", "Service & Mission", "Letters from History", "Jesus Speaks", "Prism of the Soul", "The Saints & Apostles Speak"

last_edited: 2025-05-23               # Update to today's date whenever this record is modified (YYYY-MM-DD).