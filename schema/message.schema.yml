$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://divinelove.github.io/schema/message.schema.yml"
title: Divine Love Message Metadata Schema
type: object
comment: >
  JSON Schema (draft-07) for message .yml files in /messages/YYYY/.
  The message text/body itself is stored OUTSIDE the YAML front matter (in the Markdown or after the YAML fence).
  This schema validates only the metadata fields.

required:
  - message_id
  - title
  - date
  - spirit_id
  - medium
  - message_type
  - primary_subjects

properties:
  message_id:
    type: string
    description: >
      Unique identifier: YYYY-MM-DD-{medium_initials}-{spirit_id}{-2|-3|...}
      - medium_initials = first letters of the medium's first and last names (always lowercase), e.g., Al Fike → af
      - spirit_id = all lowercase, spaces replaced by hyphens, e.g., john-the-beloved
      - Append -2, -3, ... if multiple messages share the same date/medium/spirit
    pattern: '^\d{4}-\d{2}-\d{2}-[a-z]{2}-[a-z][a-z]*(?:-[a-z][a-z]*)*(?:-(?:[2-9]|[1-9]\d+))?$'

  title:
    type: string
    description: >
      Human-readable title. If curator-supplied (not from the original), append an asterisk *.

  date:
    type: string
    format: date
    description: Date the message was received (ISO 8601, YYYY-MM-DD).

  spirit_id:
    type: string
    description: >
      Canonical ID for the spirit. Must be lowercase kebab-case and should match the
      corresponding spirit profile filename in /spirits/<spirit_id>.yml (enforced by validator).
    pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
    examples:
      - mary
      - john-the-beloved
      - james-padgett

  spirit_name:
    type: string
    description: >
      Optional human-friendly display name for the spirit. If provided, it should match
      one of the spirit aliases (enforced by validator).
    examples:
      - "Mary, Mother of Jesus"
      - "John the Beloved"

  medium:
    type: string
    description: >
      Human medium's full name (e.g., "Al Fike"). medium_initials in id derive from this (af).

  location:
    type: object
    description: Place the message was received.
    required:
      - city
    properties:
      city:
        type: string
        description: City or locality (e.g., "Gibsons").
      region:
        type: [string, "null"]
        description: State/Province/Region (optional, e.g., "BC").
      country:
        type: [string, "null"]
        description: Country (optional, e.g., "Canada").
    additionalProperties: false

  message_type:
    type: array
    description: One or more labels describing the message; can include any/all of Blessing, Guidance, Teaching.
    items:
      type: string
      enum: ["Blessing", "Guidance", "Teaching"]
    uniqueItems: true
    minItems: 1

  description:
    type: string
    description: >
      Short (1 to 2 sentences) curator summary of the message purpose/insight.
    minLength: 1
    maxLength: 600

  primary_subjects:
    type: string
    description: >
      The single most relevant subject from any level of the subject hierarchy
      (top category or subcategory). Choose the most specific and relevant subject
      regardless of its level in the hierarchy.

  secondary_subjects:
    type: array
    description: >
      Up to three additional subjects from any level of the subject hierarchy
      (top category or subcategory). Choose the most relevant subjects regardless
      of hierarchy level.
    items:
      type: string
    uniqueItems: true
    minItems: 0
    maxItems: 3

  people:
    type: array
    description: >
      Living people mentioned in or relevant to the message (exclude the medium).
    items:
      type: string
    uniqueItems: true
    default: []

  spirits:
    type: array
    description: >
      spirit_id values of other spirits mentioned besides the primary spirit author.
      Must be lowercase kebab-case matching filenames in /spirits/<spirit_id>.yml.
      Use spirit_id values (e.g., "john-the-beloved"), not display names (e.g., "John the Beloved").
    items:
      type: string
      pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
    uniqueItems: true
    default: []

  keywords:
    type: array
    description: Free-form topical tags (for search/browsing).
    items:
      type: string
      minLength: 1
      maxLength: 64
    uniqueItems: true
    default: []

  questions:
    type: array
    description: >
      Natural language questions that this message addresses, written as a seeker might
      type them into a search engine. Helps people find messages by the specific questions
      they are asking. Include as many as are relevant. Examples: "How does Divine Love
      change the soul?", "What happens when we pray for God's Love?", "Can any soul
      be redeemed no matter what they have done?"
    items:
      type: string
      minLength: 10
      maxLength: 200
    uniqueItems: true
    default: []

  related_messages:
    type: array
    description: IDs of closely related messages. Must use the same fully lowercase format as message_id.
    items:
      type: string
      pattern: '^\d{4}-\d{2}-\d{2}-[a-z]{2}-[a-z][a-z]*(?:-[a-z][a-z]*)*(?:-(?:[2-9]|[1-9]\d+))?$'
    uniqueItems: true
    default: []

  audio_url:
    type: [string, "null"]
    format: uri
    description: Optional link to audio recording (MP3/stream).

  canonical_url:
    type: [string, "null"]
    format: uri
    description: Optional permanent external URL for the officially published message.

  notes:
    type: [string, "null"]
    description: Optional curator notes or historical context.

  last_edited:
    type: [string, "null"]
    format: date
    description: Date this record was last modified (ISO 8601, YYYY-MM-DD). Helps track when translations may need updating.

additionalProperties: false