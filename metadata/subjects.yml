# subjects.yml
# Subject hierarchy for the Divine Love Messages archive.
# Each subject and subcategory includes a definition to guide curators
# and help AI systems, search engines, and seekers understand the taxonomy.

# KEY TERMINOLOGY
# Divine Love — the Essence of God, received through prayer into the soul;
#   distinct from natural human love; the transforming power at the heart of
#   these messages.
# At-onement — the state of union with God achieved through the accumulation
#   of Divine Love in the soul; spelled deliberately to distinguish from the
#   theological concept of atonement.
# New Birth — the transformation of the soul through receiving Divine Love;
#   also called the rebirth of the soul.
# Natural Love — human love in its highest expression; the natural love path
#   leads through the soul spheres but not to the Celestial Heavens.
# Medium / Instrument — the person through whom a spirit communicates.
# Circle of Light — a Divine Love prayer gathering, physical or online.
# Lattice of Light / Chain of Light / Sphere of Light — the global network
#   of souls praying for Divine Love, each a point of light connected to all
#   others, facilitating God's blessings to humanity.
# Earthbound Spirits — souls tethered to the material plane, still in
#   darkness, not yet progressing through the spirit spheres.
# The Hells / Dark Spheres — lower spirit planes of darkness and suffering.
# Soul Spheres — the progression of spirit planes on the natural love path.
# Celestial Heavens — the highest planes, for souls transformed by Divine
#   Love, in at-onement with God.

main_categories:

- name: Divine Love & Relationship with God
  definition: >
    Messages centred on the nature of God's Love as a transforming Essence
    distinct from natural human love, how it is received, and what it means
    to be in relationship with God. The foundational category of the archive.
  subcategories:
  - name: Receiving the Divine Love through Prayer
    definition: >
      The practice and experience of opening the soul to receive God's Divine
      Love through earnest prayer and longing. Covers the mechanics of
      reception, what it feels like, and why desire and invitation are
      required.
  - name: Rebirth of the Soul (New Birth)
    definition: >
      The transformation of the soul through the accumulation of Divine Love,
      described as a new birth. The soul is renewed, its conditions cleansed,
      and its faculties awakened. Distinct from the evangelical concept of
      being born again, though related.
  - name: At-onement
    definition: >
      The state of union and harmony with God achieved when the soul is
      sufficiently transformed by Divine Love. Spelled deliberately to
      distinguish from theological atonement. The ultimate destination of
      the Divine Love path.
  - name: Knowing God
    definition: >
      The direct, personal, experiential knowledge of God that comes through
      the soul rather than the mind. Contrasted with intellectual or doctrinal
      knowledge of God.
  - name: God's Nature & Essence
    definition: >
      Teachings on who and what God is, His Love, His Soul, His relationship
      to creation, and the nature of His consciousness and presence.
  - name: God's Mercy & Unconditional Love
    definition: >
      The unconditional and inexhaustible nature of God's Love for every soul,
      regardless of condition or past. Includes teachings on forgiveness,
      grace, and the accessibility of God's Love to all.

- name: Soul Transformation & Development
  definition: >
    Messages on the journey of the soul, its awakening, healing, growth,
    and progressive transformation through Divine Love. Covers both the
    joyful and the difficult aspects of this process.
  subcategories:
  - name: Soul Awakening
    definition: >
      The gradual coming to consciousness of the soul's faculties, perceptions,
      and capacities as Divine Love flows in. The soul moves from dormancy to
      active awareness, beginning to perceive and know in ways the mind alone
      cannot.
  - name: Soul Healing & Emotional Restoration
    definition: >
      The healing of deep emotional and spiritual wounds through Divine Love.
      Covers grief, trauma, buried pain, and the restoration of the soul to
      wholeness and harmony.
  - name: Personal Transformation Journey
    definition: >
      The broader arc of an individual's spiritual life, the tests, growth,
      setbacks, and progression that constitute the path of Divine Love over
      time.
  - name: Cleansing & Expiation
    definition: >
      The process by which conditions of darkness, error, and sin are
      removed from the soul, either through conscious effort on the natural
      love path or reflexively through the inflowing of Divine Love on the
      Divine path. Also called soul expiation.
  - name: Soul Growth through Challenges
    definition: >
      The teaching that difficulty, testing, and adversity are not obstacles
      to spiritual growth but often its most powerful catalysts. Suffering
      endured with prayer and faith accelerates the soul's progress.
  - name: Self-Love & Acceptance
    definition: >
      The recognition that loving oneself, honestly, compassionately, and
      without self-condemnation, is a prerequisite for loving others and
      serving God. Includes teachings on self-forgiveness and self-acceptance.
  - name: Guilt & Regret
    definition: >
      The soul's experience of remorse for past error, and the path from
      guilt toward genuine release through God's Love rather than
      self-punishment or spiritual stagnation.

- name: Spiritual Discipline & Daily Living
  definition: >
    Messages on the practical daily habits, choices, and disciplines that
    support the soul's growth and alignment with God, how to live the
    path, not just understand it.
  subcategories:
  - name: Prayer & Devotion
    definition: >
      The practice of prayer, particularly the prayer for Divine Love,
      as the central discipline of the Divine Love path. Includes teachings
      on how to pray, how often, and what to expect.
  - name: Surrender & Trust in God
    definition: >
      The practice of releasing control and self-will into God's hands,
      trusting His timing, plan, and guidance rather than forcing outcomes
      through human effort and planning.
  - name: Joyful Living
    definition: >
      The teaching that joy is a spiritual practice and a sign of soul
      health, not contingent on outer circumstances but arising from the
      soul's connection with God and the presence of Divine Love within.
  - name: Walking the Divine Path
    definition: >
      The daily experience of choosing the Divine Love path, its challenges,
      rewards, rhythms, and the ongoing choice to prioritize the soul over
      the mind and God's Will over self-will.
  - name: Humility
    definition: >
      The soul quality of honest self-knowledge, freedom from the need for
      superiority, and openness to God and others. Taught as essential for
      receiving Divine Love and serving as a channel of it.
  - name: Compassion & Empathy
    definition: >
      The cultivation of genuine compassion for others, recognising their
      pain, their hidden wounds, and their soul's longing, as a spiritual
      discipline and expression of Divine Love. Distinct from pity;
      compassion sees the soul of another clearly and loves without judgment.
  - name: Releasing Judgment
    definition: >
      The practice of letting go of judgment, both of others and of oneself,
      and meeting every soul with acceptance, seeing past surface differences
      of culture, appearance, and belief to the soul beneath. Addresses the
      harm that judgment and self-judgment do to the soul and the freedom
      that comes with releasing them. Distinct from Compassion & Empathy
      (which is the positive seeing of another's soul) and from Self-Love &
      Acceptance (which concerns one's stance toward oneself); this subject
      is the active release of the judging impulse itself.
  - name: Faith & Trust
    definition: >
      The willingness to move forward without certainty, trusting God's
      Love, plan, and guidance even when circumstances are unclear or
      difficult. Distinguished from blind belief; it is trust grounded in
      soul experience.

- name: Earthly Challenges & Human Condition
  definition: >
    Messages on the difficulties, limitations, and conditions of human life
    in a world steeped in darkness, and how Divine Love meets and transforms
    these conditions.
  subcategories:
  - name: Emotional Struggles
    definition: >
      The inner emotional turbulence, anxiety, fear, anger, loneliness,
      confusion, that accompanies both ordinary life and the process of
      soul awakening. Addressed with compassion and practical guidance.
  - name: Mind vs Soul Conflict
    definition: >
      The tension between the material mind's habitual patterns and the
      soul's deeper knowing, including the confusion, disorientation, and
      conflict that arise during the transition from mind-dominated to
      soul-dominated consciousness.
  - name: Temptations & Attachments
    definition: >
      The pull of material desires, habits, and conditions that draw the
      soul away from God and the path of Divine Love.
  - name: Free Will & Human Error
    definition: >
      The teaching that God honours human free will absolutely, and that
      the consequences of choices not in harmony with God's laws, both
      personal and collective, must be worked through. The root of the
      human condition.
  - name: Grief & Loss
    definition: >
      The experience of bereavement, loss, and separation, including the
      death of loved ones, addressed from the perspective of the continuity
      of the soul and the comfort of Divine Love.

- name: Spiritual Community & Fellowship
  definition: >
    Messages on the importance of gathering together in prayer, supporting
    one another on the path, and building communities of Divine Love in the
    world.
  subcategories:
  - name: Circle of Light & Prayer Circles
    definition: >
      A gathering of souls, physical or online, who come together to
      pray for Divine Love. The foundational unit of Divine Love community.
      When souls pray together the light is multiplied exponentially.
  - name: Lattice of Light & Global Prayer Network
    definition: >
      The global network of souls praying for Divine Love, each a point
      of light connected to all others, described variously as the Lattice
      of Light, Chain of Light, or Sphere of Light. This network facilitates
      God's blessings to humanity and is a central feature of God's plan
      for the world's redemption.
  - name: Unity in Diversity
    definition: >
      The teaching that souls from different backgrounds, cultures, and
      spiritual traditions can be united by the common experience of Divine
      Love, and that their differences enrich rather than divide.
  - name: Supporting One Another
    definition: >
      The call to be present for fellow seekers, through prayer, compassion,
      honesty, and love, recognising that the path of Divine Love is not
      walked alone.
  - name: Sanctuary & Sacred Space
    definition: >
      The blessing and purpose of physical places set apart for prayer and
      Divine Love, homes, retreat centres, and gathering spaces blessed
      by God as refuges of Light.

- name: Divine Will, Guidance & Orchestration
  definition: >
    Messages on how God's Will operates in the world, through angels,
    circumstances, and the lives of willing souls, and how to discern,
    follow, and cooperate with that Will.
  subcategories:
  - name: Surrender to God's Will
    definition: >
      The conscious choice to release personal agenda and allow God's Will
      to direct one's path, distinguished from passivity by its active
      quality of trust and engagement.
  - name: Divine Plan & Timing
    definition: >
      The teaching that God has a plan for each soul and for humanity, and
      that this plan unfolds in perfect timing, often through circuitous
      routes and over longer periods than anticipated.
  - name: God's Guidance
    definition: >
      The ways in which God communicates direction, inspiration, and wisdom
      to the soul, through prayer, soul perceptions, circumstances, and
      the influence of angels.
  - name: Alignment with Divine Flow
    definition: >
      The experience of being in harmony with God's Will, a state of ease,
      clarity, and rightness that distinguishes soul-guided action from
      mind-driven effort.

- name: Preparation for Earth Mission
  definition: >
    Messages on the readying of souls for active service in the world,
    the inner preparation required before gifts can be expressed and the
    mission fulfilled.
  subcategories:
  - name: Readiness & Spiritual Maturity
    definition: >
      The soul conditions, sufficient cleansing, soul awareness, and
      alignment with God, that must be in place before a soul is ready
      to serve effectively as God's instrument.
  - name: Unique Soul Gifts
    definition: >
      The distinctive gifts, capacities, and callings that are unique to
      each soul and that God intends to express through each individual
      in service to humanity.
  - name: Mediumship & Developing as an Instrument
    definition: >
      The development of mediumship and related gifts, including Direct
      Voice, through which spirit communicates with and through willing
      souls on Earth. Requires soul purity, patience, and God's timing.
  - name: Overcoming Fear & Doubt
    definition: >
      The inner work of releasing the fears and doubts that hold souls back
      from stepping into their calling and trusting God's plan for their lives.

- name: Service, Ministry & Being a Channel of Love
  definition: >
    Messages on the outward expression of the Divine Love path, bringing
    Light, Truth, and healing to others in the world through prayer,
    presence, and service.
  subcategories:
  - name: Discipleship
    definition: >
      The committed following of the path of Jesus and the Divine Love
      teachings, not as religious obligation but as a chosen way of life
      oriented toward God and service.
  - name: Teaching & Sharing the Message
    definition: >
      The call to bring the Truth of Divine Love to others, through word,
      presence, example, and prayer, in whatever ways God opens.
  - name: Testimony of God's Love
    definition: >
      The sharing of personal experience of Divine Love as a form of
      witness and encouragement to others who are seeking.
  - name: Interfaith & Universal Truth
    definition: >
      The recognition that the Truth of Divine Love transcends any single
      religion or tradition and speaks to all souls regardless of background.

- name: Soul Healing & Emotional Restoration
  definition: >
    Messages specifically focused on healing, of the soul, the emotions,
    and the conditions inherited from the human condition, through Divine
    Love and its transforming power.
  subcategories:
  - name: Divine Love Healing
    definition: >
      The teaching that Divine Love is the greatest healing force available
      to humanity, healing not only the soul but influencing the mind,
      spirit, and physical body.
  - name: Letting Go of Wounds
    definition: >
      The release of pain, resentment, grief, and old conditions that have
      been held in the soul, a necessary part of expiation and healing.
  - name: Healing Through Prayer
    definition: >
      The role of prayer, both personal and intercessory, in facilitating
      healing for oneself and others.

- name: Earth Changes & Prophecy
  definition: >
    Messages containing prophetic content about coming changes in the world,
    the intensification of conditions, and humanity's choice between paths
    of Light and darkness.
  subcategories:
  - name: Future World Events
    definition: >
      Specific or general prophetic statements about events yet to unfold
      in the world, storms, changes, upheavals, and their spiritual
      significance.
  - name: Acceleration of Change
    definition: >
      The teaching that change in the world is intensifying and that souls
      must prepare, spiritually and practically, for what is coming.
  - name: Cleansing of the Earth
    definition: >
      The teaching that the Earth itself is undergoing a process of
      purification, and that this process, though difficult, will ultimately
      bring greater harmony.
  - name: Two Choices for Humanity
    definition: >
      The prophetic framing that humanity stands at a crossroads between
      the path of Light and the continuation of darkness, and that the
      choices of awakened souls now tip the balance.

- name: Nature, Environment & God's Creation
  definition: >
    Messages on the beauty and spiritual significance of the natural world
    as an expression of God's Love and creative power.
  subcategories:
  - name: Beauty & Spiritual Joy
    definition: >
      The recognition of beauty, in nature, in life, in God's creation,
      as a spiritual practice and a doorway to God's presence.
  - name: Reverence for the Earth
    definition: >
      The call to treat the Earth and its creatures with care, respect,
      and gratitude as gifts from God.
  - name: Harmony with Nature
    definition: >
      The teaching that living in harmony with the natural world reflects
      and supports inner harmony with God's laws.

- name: Spiritual Warfare & Opposition
  definition: >
    Messages on the forces that oppose the growth of Divine Love, dark
    conditions, earthbound spirits, and the accumulated darkness of humanity,
    and how to navigate them with strength and faith.
  subcategories:
  - name: Earthbound Spirits & Dark Influences
    definition: >
      Souls tethered to the material plane, still in darkness and not yet
      progressing through the spirit spheres, and the influence their
      conditions can exert on those in the material world.
  - name: Darkness vs Light
    definition: >
      The ongoing spiritual reality of light and darkness in the world and
      in the individual soul, and the choice to align with Light through
      prayer and love.
  - name: Protection from Negative Influences
    definition: >
      The spiritual protection available to those who walk in God's Love,
      including the shield of Light described in several messages, and how
      to maintain it through alignment with God.

- name: Spiritual Identity & Destiny
  definition: >
    Messages on who each soul truly is, its unique gifts, its divine
    purpose, and its eternal destiny in God's great plan.
  subcategories:
  - name: Unique Soul Gifts
    definition: >
      See Preparation for Earth Mission > Unique Soul Gifts.
  - name: Divine Purpose
    definition: >
      The teaching that every soul has a specific purpose in God's plan,
      a role to play, a contribution to make, that only that soul can fulfill.
  - name: Soul's True Nature
    definition: >
      The recognition of the soul as the truest, deepest self, more real
      than the material mind or the personality, and the journey of
      coming to know and express it.
  - name: Celestial Destiny
    definition: >
      The ultimate destiny of souls who receive Divine Love, at-onement
      with God in the Celestial Heavens, an infinite journey of growth
      and love.

- name: Collective Awakening & Redemption
  definition: >
    Messages on the larger arc of humanity's spiritual journey, the
    awakening of mass consciousness, the redemption of the world, and the
    role of Divine Love seekers in God's plan for the salvation of mankind.
  subcategories:
  - name: Redemption of Humanity
    definition: >
      The teaching that God's plan encompasses not just individual souls
      but all of humanity, and that the accumulation of Divine Love
      seekers is part of His plan to redeem and uplift the world.
  - name: Awakening Mass Consciousness
    definition: >
      The gradual awakening of humanity to soul awareness and Divine Love,
      slow but accelerating, in which every awakened soul contributes.
  - name: Global Spiritual Work
    definition: >
      The coordinated work of souls on both sides of life, in prayer,
      service, and Light, to bring about the conditions for humanity's
      redemption.

- name: Interdimensional & Spirit Communication
  definition: >
    Messages on the nature of the spirit world, its planes, its inhabitants,
    and the conditions of communication between spirit and material planes.
  subcategories:
  - name: Soul Spheres & Progression
    definition: >
      The planes of the spirit world through which souls on the natural
      love path progress after death, ascending through increasing harmony
      toward the sixth sphere, beyond which only Divine Love can carry them.
  - name: Celestial Heavens & At-onement
    definition: >
      The highest spirit planes, inhabited by souls who have received
      sufficient Divine Love to be transformed, in at-onement with God
      and continuing their eternal journey of growth and service.
  - name: The Hells & Dark Spheres
    definition: >
      The lower spirit planes of darkness and suffering, inhabited by souls
      whose conditions are not yet in harmony with love, not a place of
      eternal punishment but of eventual opportunity for growth.
  - name: Spirit Guides & Angels
    definition: >
      The Celestial and other spirits who accompany, guide, protect, and
      assist souls on Earth, including the angels sent by God to answer
      prayer and facilitate His blessings.
  - name: Mediumship & Developing as an Instrument
    definition: >
      See Preparation for Earth Mission > Mediumship & Developing as an
      Instrument.
  - name: Spirit Testimony & Personal Story
    definition: >
      Messages in which a spirit speaks directly about their own Earth life,
      passing, and experience in spirit, providing biographical and
      experiential witness.

- name: Teaching, Testimony & Instruction
  definition: >
    Messages primarily focused on imparting knowledge, correcting error,
    or providing structured spiritual instruction.
  subcategories:
  - name: Teaching the Prayer Practice
    definition: >
      Direct instruction on how to pray for Divine Love, the posture,
      intention, longing, and openness required, often addressed to
      newcomers or those just beginning the path.
  - name: Discernment & Truth-Seeking
    definition: >
      The cultivation of the soul's capacity to distinguish truth from
      error, genuine spiritual experience from imagination, and God's
      guidance from the mind's projections.
  - name: Religious Error & Reformation
    definition: >
      The correction of doctrines, beliefs, and practices in established
      religion that have obscured or distorted the Truth of God's Love,
      particularly around atonement, heaven, hell, and prayer.

- name: Celestial Governance & Spiritual Law
  definition: >
    Messages on the laws and principles that govern both the material and
    spirit worlds, laws that operate regardless of belief and that frame
    the consequences of spiritual choices.
  subcategories:
  - name: Law of Attraction
    definition: >
      The teaching that souls draw to themselves conditions, experiences,
      and connections that match their own light or darkness, and that
      prayer for Divine Love invokes the Law of Love in powerful ways.
  - name: Law of Compensation
    definition: >
      The law by which every condition of darkness in the soul must be
      reconciled and brought to Light, either through conscious effort
      on the natural love path or reflexively through Divine Love on the
      Divine path.
  - name: Law of Free Will
    definition: >
      The relationship between human free will and God's laws. God honours
      free will absolutely, but the laws of cause and effect mean that
      choices not in harmony with love carry consequences.
  - name: Law of Activation
    definition: >
      The spiritual law by which God responds to sincere, soul-directed
      prayer. When a soul reaches out to God with genuine longing and
      desire, this law is invoked and blessings, healing, and Divine Love
      flow in response. Requires active, heartfelt intention rather than
      passive wishing.
  - name: Law of Love
    definition: >
      The law by which God's Love, sought through sincere prayer and the
      soul's longing, flows into the soul and draws the angels near. Often
      named together with the Law of Attraction, it is the law invoked when
      a soul reaches for the Divine Love, governing how that Love is given
      and how it transforms the soul that receives it.
  - name: Law of Communication & Rapport
    definition: >
      The spiritual law governing the conditions required for clear and
      powerful communication between spirits and mortals. When those in
      a circle direct their love toward the instrument, align their souls
      with God, and maintain elevated conditions through prayer, they
      build a rapport that enables spirits to draw close, communicate
      clearly, and convey blessings of greater depth and quality. The
      strength of communication is directly proportional to the spiritual
      conditions created by those present.

- name: Historical Context & Spiritual Legacy
  definition: >
    Messages in which historical figures speak from their perspective in
    spirit, or in which the history and legacy of the Divine Love teachings
    is addressed.
  subcategories:
  - name: Spirit Testimony & Personal Story
    definition: >
      See Teaching, Testimony & Instruction > Spirit Testimony & Personal
      Story.
  - name: Life of Jesus
    definition: >
      Messages touching on the historical life, mission, and teachings of
      Jesus, particularly the Truth of Divine Love as his central message.
  - name: Religious Error & Reformation
    definition: >
      See Teaching, Testimony & Instruction > Religious Error & Reformation.
  - name: Padgett Messages & Legacy
    definition: >
      References to the foundational channelled messages received by James
      Padgett in the early twentieth century, the historical root of the
      Divine Love movement.

- name: Spiritual Empowerment & Encouragement
  definition: >
    Messages whose primary purpose is to affirm, strengthen, and encourage
    those on the path, addressing doubt, fatigue, and discouragement with
    love and reassurance.
  subcategories:
  - name: Confidence in the Path
    definition: >
      Affirmation that the path of Divine Love is real, that progress is
      being made even when it cannot be felt, and that God's Love is
      sufficient for every challenge.
  - name: Reassurance & Strength
    definition: >
      Direct encouragement to those who are struggling, reminding them
      they are loved, never alone, and upheld by God and the angels.
  - name: Overcoming Inadequacy & Doubt
    definition: >
      Addressing the common experience of feeling unworthy, too broken,
      or too far from God to receive His Love or fulfil a purpose.

- name: Creation and Incarnation
  definition: >
    Messages on the origin and nature of the soul, the purpose of physical
    life, and the relationship between the material and spiritual dimensions
    of existence.
  subcategories:
  - name: Nature of the Soul
    definition: >
      Teachings on what the soul is, its origin, its faculties, its
      relationship to the mind and body, and its capacity to know God
      and receive Divine Love.
  - name: Purpose of Physical Life
    definition: >
      The teaching that the Earth life is a unique and precious opportunity
      for soul growth, particularly for the reception of Divine Love,
      that cannot be replicated in the same way in the spirit world.
  - name: Natural Love & Human Development
    definition: >
      The nature and limits of natural human love, the love that souls
      are born with and that can be cultivated on the natural love path.
      Distinct from Divine Love, though related and not diminished.
  - name: Soul Mates & Sacred Union
    definition: >
      Teachings on the nature of soul mates — the two halves of a single
      soul created together by God — including the possibility and
      challenges of soul mates meeting and working together on Earth,
      the sacred nature of this union, and its relationship to at-onement
      with God. Includes Jesus's disclosure that he incarnated as a
      complete soul without a soul mate.

- name: Manifestations & Direct Voice
  definition: >
    Messages related to the development and expression of physical
    mediumship, including Direct Voice, healing manifestations, and
    other phenomena that bridge the material and spirit worlds.
  subcategories:
  - name: Direct Voice Communication
    definition: >
      The development of the gift of Direct Voice, in which spirit
      communicates audibly and independently through the medium, described
      as a major goal of the circle of seven and requiring soul purity,
      collective prayer, and God's timing.
  - name: Physical Manifestations
    definition: >
      Tangible, physical expressions of spirit presence and Divine Love,
      including healing phenomena, sensations, and other signs.
  - name: Signs & Wonders
    definition: >
      Unexpected, confirmatory experiences, synchronicities, answered
      prayers, and moments of unmistakable Divine presence, that strengthen
      faith and witness to the reality of God's Love.