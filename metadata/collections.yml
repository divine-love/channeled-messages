# collections.yml
# Thematic collections for the Divine Love Messages archive.
# Each collection groups messages by theme and is used to generate
# browse pages in content/collections/.
# Generated pages are produced automatically by generate_collections.py.
#
# --- HOW TO CHOOSE ---
# collections organise BROWSING. Ask: "Would a reader interested in this
# theme want to find this message?" If yes, add it to the relevant
# collection. A message can belong to more than one collection, but aim
# for relevance — don't add a message to a collection just because the
# theme is mentioned briefly.
#
# collections and essential_teachings serve different purposes and can
# both apply to the same message. For example, a message from Jesus that
# establishes foundational doctrine would go in the "Jesus Speaks"
# collection AND carry a "Core Teaching" essential_teachings flag.
#
# Common contributor questions:
# Q: What is the difference between "Awakening Humanity" and "Service & Mission"?
# A: "Service & Mission" focuses on the individual caller — their gifts,
#    calling, and role as a channel of love. "Awakening Humanity" focuses
#    outward — the broader global shift in consciousness and the role of
#    prayer circles and light workers in that shift. A message can belong
#    to both if it addresses both scales.
#
# Q: Does every message from an apostle go in "The Saints & Apostles Speak"?
# A: Yes, if the spirit is a biblical apostle or saint. Jesus has his own
#    collection ("Jesus Speaks") and does not go in "The Saints & Apostles Speak."
#
# Q: What qualifies for "Letters from History"?
# A: Historical figures outside the biblical canon — philosophers, rulers,
#    mystics, scientists. Biblical figures (apostles, Moses, Mary) belong
#    in other collections. If uncertain, check whether the spirit appears
#    in the Bible; if yes, use another collection.
#
# Q: Can a message belong to more than one collection?
# A: Yes. Two or three collections per message is reasonable. More than
#    three is a signal the collections may be too broadly applied.

collections:

- name: "Awakening Humanity"
  definition: >
    Messages concerning the broader spiritual awakening of humanity —
    the global shift in consciousness that the Divine Love teachings
    anticipate and call forth. Includes teachings on the role of prayer
    circles, light workers, and the awakening mission in the world.

- name: "Healing Path"
  definition: >
    Messages about healing in all its dimensions — physical, emotional,
    and spiritual. Includes teachings on how Divine Love heals, the
    mechanics of spirit healing, and the restoration of the soul and body
    through prayer and God's Love.

- name: "Jesus Speaks"
  definition: >
    Messages channelled directly from Jesus of Nazareth. Jesus is the
    foremost teacher in the Divine Love archive, speaking on prayer,
    the soul, at-onement, service, and the truth of God's Love as the
    heart of his original mission.

- name: "Letters from History"
  definition: >
    Messages from historical figures beyond the biblical canon —
    philosophers, rulers, mystics, scientists, and others speaking
    from their perspective in spirit about Divine Love, truth, and the
    soul's journey.

- name: "Mind & Soul"
  definition: >
    Messages exploring the relationship between the material mind and
    the soul — how the mind can assist or obstruct the soul's growth,
    the integration of mind and soul, and the soul's faculties of
    perception and knowing.

- name: "Prism of the Soul"
  definition: >
    Messages exploring the nature, faculties, and gifts of the soul —
    its capacity for Divine Love, its unique expression, its senses,
    and the gifts that emerge as it is awakened and transformed.

- name: "Service & Mission"
  definition: >
    Messages about service, mediumship, and the mission of those
    called to carry Divine Love to the world. Covers the development
    of gifts, the challenges of being a channel of love, and the
    calling to awaken others.

- name: "The Saints & Apostles Speak"
  definition: >
    Messages from the biblical apostles and saints speaking directly
    from their perspective in spirit — Andrew, James, John the Beloved,
    Peter, Matthew, Mark, Luke, Francis of Assisi, and others. These
    spirits offer personal testimony, teaching, and encouragement
    grounded in their own experience of Divine Love.

- name: "Two Paths"
  definition: >
    Messages contrasting the natural love path and the Divine Love path
    — the two ways a soul may progress after physical life. Clarifies
    the distinction between natural love (which leads to the soul
    spheres) and Divine Love (which leads to the Celestial Heavens and
    at-onement with God).