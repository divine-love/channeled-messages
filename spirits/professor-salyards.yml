spirit_id: professor-salyards
spirit_name: "Professor Salyards"
spirit_aliases: ["Joseph H. Salyards", "Professor Joseph H. Salyards"]
spirit_description: "Professor Joseph H. Salyards (d. 1885) was an instructor at the Polytechnic Academy Institute in New Market, Virginia, and a close friend of James E. Padgett during Padgett's student years. After passing in 1885, he became one of the first spirits to communicate with Padgett through automatic writing, addressing him affectionately as 'my old professor and teacher' in recognition of their reversed roles. His messages in the Padgett collection focused on spiritual laws, soul development, the Law of Compensation, the importance of Divine Love, and the distinction between material knowledge and spiritual understanding. In the Al Fike messages, he appears as a dedicated worker in the development of Direct Voice mediumship, having taken a keen interest in the circle's work and working tirelessly behind the scenes to help bring this gift to fruition."
