spirit_id: osho-bhagwan
spirit_name: "Osho Bhagwan"
spirit_aliases: ["Osho"]
spirit_description: >
  Osho Bhagwan was a guru whose Earth life ambition was to bring liberation to
  the passions of humanity through transcendental understanding and the
  awakening of human potential, teaching the taming of human desires as a way
  to deeper knowledge of the true self. He speaks from the spirit world as a
  soul still on its journey, who has not yet entered the Celestial Spheres but
  yearns for the gift of Divine Love from the Creator and pursues it with
  fervency. He reflects that, though he had many gifts and touched many people,
  he neglected to allow the Divine to truly guide him, so his mission, while
  partially successful, was never complete. He now recognizes the power of love
  as the true passion of the soul and the true liberation, and commits to
  continue seeking the transformative power of Love and to return and speak of
  his journey.
notes: >
  Spirit file created from 2019-02-12-af-osho-bhagwan, a message in the
  archive delivered by this spirit. All biographical detail is drawn from his
  own words in that message. He states he has not yet entered the Celestial
  Spheres and is pursuing Divine Love from the natural love spheres, which
  distinguishes his testimony from spirits who speak from the Celestial Kingdom.
  Further detail to be added as more messages emerge.