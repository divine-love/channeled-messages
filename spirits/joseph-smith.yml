spirit_id: joseph-smith
spirit_name: "Joseph Smith"
spirit_aliases: ["Joseph Smith Jr."]
spirit_description: >
  Joseph Smith (1805-1844) was the founder of the Church of Jesus Christ of
  Latter-day Saints, known as the Mormon Church, one of the most significant
  new religious movements of the nineteenth century. He claimed to receive
  divine revelations and visions, including the visitation of angels, and
  produced the Book of Mormon. In the Divine Love messages, Smith speaks from
  the Celestial Heavens, acknowledging that angels did indeed influence and
  support his Earth life work, but that he now sees how his church has become
  infected by the human condition and the will of man. He affirms the Truth of
  Divine Love as the highest path and encourages those within organised religion
  to be examples of Love and Truth from within.
notes: >
  Key biographical message: 2015-06-15-af-joseph-smith (identifies himself as
  founder of the Mormon Church, confirms Celestial Kingdom, acknowledges angelic
  influence during his Earth life, and reflects on the divergence of his church
  from Divine Truth).