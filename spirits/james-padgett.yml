spirit_id: james-padgett
spirit_name: "James Padgett"
spirit_aliases: ["Mr. Padgett", "James E. Padgett"]
spirit_description: "James E. Padgett (1852–1923), a Washington D.C. lawyer who became the primary medium for the foundational Divine Love messages, now known as the Padgett Messages. Beginning around 1914, he received thousands of communications from celestial spirits including Jesus, his apostles, and many other high spirits, forming the doctrinal basis of the Divine Love movement. Now a celestial spirit himself, he is frequently referenced in later messages as the one through whom the teachings were first brought to the world."
