spirit_id: elijah
spirit_name: "Elijah"
spirit_aliases: ["Elijah the Tishbite"]
spirit_description: >
  Elijah was a Hebrew prophet of the ninth century BC, active in the northern
  kingdom of Israel during the reigns of Ahab and Ahaziah, whose deeds are
  recorded in the books of Kings. He is remembered for his solitary stand
  against the prophets of Baal, his zeal for the God of Israel, and the
  tradition that he was taken up to heaven in a whirlwind rather than dying an
  ordinary death. In the Divine Love messages he speaks as a prophet who knew
  the loneliness of proclaiming an unwelcome truth, encouraging those called to
  the same work to listen for God's guidance and to walk as channels of love
  and truth in the world.
notes: >
  Biographical detail from 2019-02-21-af-elijah: Elijah speaks in the first
  person of having walked the Earth proclaiming the truth God had given him,
  describing it as a lonely journey in which he was ridiculed and disbelieved,
  and states that much of what he said was true or came true in years beyond
  his time.