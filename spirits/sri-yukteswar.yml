spirit_id: sri-yukteswar
spirit_name: "Sri Yukteswar"
spirit_aliases: ["Sri Yukteswar Giri", "Swami Sri Yukteswar"]
spirit_description: >
  Sri Yukteswar was the guru of Paramahansa Yogananda during his Earth life,
  a teacher within the Hindu tradition who guided Yogananda along his
  spiritual path before Yogananda carried those teachings to America. In the
  Divine Love messages, Yogananda describes Sri Yukteswar as already well
  established in the truths of Divine Love in the spirit world, and credits
  their reunion and realignment in spirit with helping him progress quickly
  through the spheres toward the Celestial Kingdom.
notes: >
  Referenced by Yogananda in 2019-04-01-jw-yogananda as his beloved teacher,
  already established in Divine Love in the spirit world, whose reunion with
  Yogananda aided his progress through the spheres. Also referenced, though
  not by name, in 2019-01-28-af-yogananda (a "[Sri ?]" notation in the
  source, understood to be this teacher).