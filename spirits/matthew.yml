spirit_id: matthew
spirit_name: "Matthew"
spirit_aliases: ["Matthew the Apostle", "Levi"]
spirit_description: "Matthew (d. c. 70 AD), one of the twelve apostles of Jesus, traditionally identified as the author of the Gospel of Matthew. A tax collector by profession before being called by Jesus, he is known in the Divine Love messages as a warm and encouraging teacher who speaks particularly on the themes of change, soul awakening, and the transition from a mind-dominated existence to one centred in God's Love."
notes: >
  Biographical detail from 2019-02-15-af-matthew: Matthew gives a first-person
  eyewitness account of the Pentecost, describing it as a sudden and powerful
  experience of great light and heat, like a fire that did not burn but healed
  and changed those present, bringing relief, joy, and a closeness with God they
  had not felt before. This places him among the disciples who received the
  Pentecost.