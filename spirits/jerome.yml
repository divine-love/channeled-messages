spirit_id: jerome
spirit_name: "Jerome"
spirit_aliases: []
spirit_description: >
  Jerome identifies himself as a spirit who was martyred many years ago and
  is now an inhabitant of the Celestial Kingdom. In his earth life he walked
  the streets carrying his truth, and from spirit he has committed himself
  to supporting those who carry the message of God's Love into the lands of
  the Balkans, long weighed down by strife and war.
notes: >
  Biographical details from 2016-09-12-af-jerome (received in Belgrade,
  Serbia): martyred many years ago; now an inhabitant of the Celestial
  Kingdom; in his earth life walked the streets with his truth and
  understands the plight of the lone man carrying a message of truth.
  Pledges his ongoing support to the work of bringing healing and Love to
  that part of the world. His further identity is not stated in the message.