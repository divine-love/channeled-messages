spirit_id: mark
spirit_name: "Mark"
spirit_aliases: ["Mark the Evangelist", "John Mark"]
spirit_description: "Mark the Evangelist (d. c. 68 AD), traditionally identified as the author of the Gospel of Mark — the earliest of the four canonical gospels — and a companion of both Peter and Paul in the early Christian church. Also known as John Mark in the Acts of the Apostles. Now a celestial spirit, he communicates in the Divine Love messages with deep tenderness and personal care, offering encouragement and affirmation to individual souls on their spiritual journey. He identifies himself as the guardian spirit of the First United Spiritualist Church in Burnaby, BC."
notes: >
  Mark identifies himself as the guardian spirit of the church in Burnaby, BC
  (the First United Spiritualist Church) in 2018-08-05-af-mark and 2019-03-29-af-mark.