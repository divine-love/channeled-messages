spirit_id: michael
spirit_name: "Michael"
spirit_aliases: []
spirit_description: >
  Michael is a Celestial spirit who identifies himself as a guide and helper
  in the Divine Love circles, working to arrange and encourage souls to gather
  in prayer and receive truth. He describes himself as one angel among many
  who work with souls on Earth. By his own account he was a man who had many
  struggles in his Earth life but ultimately found his way to God, and now
  resides in the Celestial Kingdom.
notes: >
  First message: 2018-11-18-af-michael. Michael identifies himself as an
  inhabitant of the Celestial Kingdom guiding two souls on a prayer mission
  in Sydney, Australia. Biographical detail from 2018-11-22-af-michael (Speak
  of Simple Truth): Michael discloses he had many struggles in his Earth life
  but found his way to God.