spirit_id: mary
spirit_name: "Mary, Mother of Jesus"
spirit_aliases: [Mary]
spirit_description: "Mother of Jesus, a celestial spirit and frequent communicator in the Divine Love messages."
notes: >
  Biographical details from 1963-12-26-ds-mary (received through Dr. Daniel
  Samuels): legally married to Joseph, who was a young man, not the aged
  figure of tradition; mother of eight children, the firstborn being Jeshua
  (Jeshu). Names Judah and Jacob as sons and Leah and Rachel as daughters;
  states "Judah and Thomas became his apostles" (Thomas's family relation is
  not stated explicitly). Denies the virgin birth; Jesus was born naturally,
  and no one in the family had any inkling of his future role. Recounts that
  the family believed Jesus deranged when he spoke of God's Soul Quality
  within his own being, and that she understood only at the foot of the
  cross and after his death, when pain, grief, and love brought some of the
  Divine Love into her soul; her love for her son deepened into the Divine
  Love later. After the crucifixion the family home was broken: Joseph
  departed on preaching missions, Jacob founded the Jerusalem sect, and her
  sons met death in their missions. Signs herself "Mother of Jesus and
  Celestial Spirit." Communicated with approval from Jesus.