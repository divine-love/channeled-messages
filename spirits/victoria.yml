spirit_id: victoria
spirit_name: "Victoria"
spirit_aliases: ["Queen Victoria", "Queen Victoria of England"]
spirit_description: >
  Victoria (1819-1901), Queen of the United Kingdom of Great Britain and
  Ireland from 1837 until her death, and Empress of India from 1876. One
  of the longest-reigning British monarchs, she presided over a period of
  great industrial, cultural, and imperial expansion. During her Earth life
  she had a genuine interest in and personal experience of spirit
  communication, participating in circles, though she notes these were of
  lower calibre than the Divine Love circles she now observes from spirit.
  In the Divine Love messages she speaks as an encouraging and observant
  presence, moved by the quality of light she witnesses in the circle and
  eager to support its work from the spirit world.
notes: >
  Key biographical message: 2019-01-25-af-victoria (Continue Your Efforts)
  — Victoria identifies herself as once Queen of England and discloses that
  she participated in spirit circles during her Earth life, describing them
  as of lower calibre and light than this circle.