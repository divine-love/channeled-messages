spirit_id: alec-gaunt
spirit_name: "Alec Gaunt"
spirit_aliases: ["Alec"]
spirit_description: "Alec Gaunt (d. 1970), a skilled psychic and healer who, alongside his wife Phyllis, discovered the Padgett messages in 1949 and devoted his life to sharing the teachings of Divine Love throughout western Canada. He established many Divine Love prayer groups, became known for his healing abilities, lectures, and spiritual gatherings, and fostered a lasting community through collaborations including visits from Dr. Leslie Stone. His legacy endures in Vancouver's spiritual circles. Now a celestial spirit, he continues to work closely with Al Fike and the Divine Love community as a beloved friend, guide, and protector."
