spirit_id: alec-gaunt
spirit_name: "Alec Gaunt"
spirit_aliases: []
spirit_description: >
  Alec Gaunt was a devoted worker for the Truth of Divine Love during his
  Earth life, facilitating its understanding through work with many people
  and many circles of Light. By his own account, his desires were stronger
  than God's Will and he pushed so hard that he passed into spirit sooner
  than he should have — a lesson he now shares candidly with those gathered
  to help them walk with greater patience and faith. In the Divine Love
  messages he appears as a warm and practical teacher on the themes of
  balance between self-will and God's Will, spiritual discipline, and the
  cooperative nature of life with God.
notes: >
  Key biographical message: 2018-05-09-af-alec-gaunt (Walk in Harmony With
  God's Will) — Alec's most personal disclosure, revealing he passed into
  spirit sooner than he should have due to pushing too hard.