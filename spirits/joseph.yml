spirit_id: joseph
spirit_name: "Joseph"
spirit_aliases: []
spirit_description: "Joseph of Nazareth, husband of Mary and earthly father of Jesus, a carpenter of Galilee who raised and protected the young Jesus during his formative years. Though he initially struggled to understand his son's mission, Joseph ultimately came to a deep recognition of Jesus' spiritual greatness. Now a high celestial spirit, he communicates in the Divine Love messages as a warm and eloquent teacher."
