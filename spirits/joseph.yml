spirit_id: joseph
spirit_name: "Joseph"
spirit_aliases: []
spirit_description: "Joseph of Nazareth, husband of Mary and earthly father of Jesus, a carpenter of Galilee who raised and protected the young Jesus during his formative years. Though he initially struggled to understand his son's mission, Joseph ultimately came to a deep recognition of Jesus' spiritual greatness. Now a high celestial spirit, he communicates in the Divine Love messages as a warm and eloquent teacher."
notes: >
  In 2016-03-28-af-joseph, Joseph recalls that the tenets of his own religion
  made it difficult for him to commit to his son's simple Truths of Love during
  his Earth life, and that he reached clear understanding of the Divine Love path
  only after entering the world of spirit. In 2019-04-03-af-joseph, he states
  that he did not understand his son's mission during his Earth life, nor
  recognize the power of God's Love to transform the soul, and proclaims that
  Jesus was the Messiah not only for the Jews but for all of humanity.