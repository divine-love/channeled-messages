spirit_id: solomon
spirit_name: "Solomon"
spirit_aliases: ["King Solomon", "Solomon son of David"]
spirit_description: >
  Solomon was the son of King David and the third king of Israel, renowned in
  scripture for the extraordinary wisdom God granted him and for his authorship
  of the biblical books of Proverbs, Ecclesiastes, and the Song of Solomon. He
  built the First Temple in Jerusalem and presided over Israel's golden age of
  prosperity and learning. In the Divine Love messages, Solomon speaks candidly
  about the limits of his famous Earth life wisdom, describing it as the product
  of the intellect rather than the soul — myth and legend built on mental
  faculties rather than soul perception. He has since progressed in spirit and
  become a Celestial Angel through the redemption of God's Love within his soul,
  and now comes as a guide to seekers whose intellectual hunger outpaces their
  trust in the soul, bringing counsel on discernment, patience, and the path from
  mental speculation to the deeper knowing that comes through Divine Love.
notes: >
  Key biographical message: 2015-11-23-af-solomon (King Solomon Talks about How
  to Obtain True Wisdom) — Solomon identifies himself as now a Celestial Angel
  through Divine Love redemption, and reflects that his legendary Earth life
  wisdom was intellectual rather than soul-based.