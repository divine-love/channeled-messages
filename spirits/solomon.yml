spirit_id: solomon
spirit_name: "Solomon"
spirit_aliases: ["King Solomon", "Solomon son of David"]
spirit_description: >
  Solomon was the son of King David and the third king of Israel, renowned in
  scripture for the extraordinary wisdom God granted him and for his authorship
  of the biblical books of Proverbs, Ecclesiastes, and the Song of Solomon. He
  built the First Temple in Jerusalem and presided over Israel's golden age of
  prosperity and learning. In the Divine Love messages, Solomon speaks as a guide
  to seekers whose intellectual hunger outpaces their trust in the soul, bringing
  counsel on discernment, patience, and the path from mental speculation to the
  deeper knowing that comes through God's Love.
