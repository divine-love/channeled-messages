spirit_description: "John Wesley (1703-1791) was an English clergyman, theologian, and evangelist who founded the Methodist movement, which grew into one of the world's largest Protestant denominations. A prolific writer and preacher who delivered thousands of sermons across Britain, Wesley emphasized personal holiness, social justice, and the experience of God's grace in the heart of the believer. In the Divine Love messages, he identifies himself as a current inhabitant of the Celestial Kingdom, and speaks with urgency about the need for humanity to awaken from the illusions of the mind and discover the soul's capacity to know God and Truth directly through Love."
