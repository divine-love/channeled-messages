spirit_id: mary-magdalene
spirit_name: "Mary Magdalene"
spirit_aliases: ["Mary of Magdala"]
spirit_description: >
  Mary Magdalene was a devoted follower of Jesus during his Earth life and
  ministry, one who was close to him at times and ministered to his practical
  needs as he journeyed. She loved him deeply in innocence and gratitude, and
  it was Jesus who directed her gaze toward God and changed her life through
  his teaching. She was never his wife, lover, or soulmate. Now an inhabitant
  of the Celestial Kingdom, she continues to follow his teachings and lives in
  great joy and fulfillment in the brightness of the Father's Love.
notes: >
  Key biographical message: 2019-01-29-af-mary-magdalene (Mary Magdalene Is
  Not Jesus' Soulmate) — Mary confirms she was a devoted follower and
  minister to Jesus, not his soulmate, wife, or lover, and that she is now
  an inhabitant of the Celestial Kingdom. Delivered as a direct confirmation
  of the disclosure in 2019-01-27-af-jesus.