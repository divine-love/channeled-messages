spirit_id: abdullah-latif
spirit_name: "Abdullah Latif"
spirit_aliases: []
spirit_description: >
  Abdullah Latif is a Celestial spirit who lived in the Middle East many years
  ago, working as a philosopher, teacher, and mathematician with influence in
  the courts and powers of his time. Now an inhabitant of the Celestial Kingdom,
  he appears in the Divine Love messages as a thoughtful and measured teacher,
  particularly on the nature of prayer, wisdom, and the conditions required for
  prayer to be truly effective. He speaks with the perspective of someone who
  understands both the life of the mind and the deeper knowing that comes only
  through the soul.
notes: >
  Key biographical message: 2018-11-29-af-abdullah-latif (The Power of Prayer)
  — Abdullah identifies himself as a former philosopher, teacher, and
  mathematician from the Middle East who had influence in the courts of his
  time, and confirms he is now an inhabitant of the Celestial Kingdom.