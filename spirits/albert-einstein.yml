spirit_id: albert-einstein
spirit_name: "Albert Einstein"
spirit_aliases: []
spirit_description: >
  Albert Einstein (1879-1955), the German-born theoretical physicist whose
  work on the theory of relativity and quantum mechanics transformed modern
  physics. He is one of the most celebrated scientists in history, awarded
  the Nobel Prize in Physics in 1921. In the Divine Love messages he appears
  as part of a collaborative group of scientists in the spirit world working
  to forge deeper and more precise communications between spirit and the
  physical world, with the goal of bringing greater truth and understanding
  to humanity in preparation for the coming changes. He describes God's
  constant movement of all things toward harmony as a fundamental principle
  of the universe.
notes: >
  Key biographical message: 2019-01-25-af-albert-einstein (Many Scientists
  in Spirit Are Working to Forge Greater Communications between Worlds)
  — Einstein identifies himself as part of a group of scientists in spirit
  working collaboratively to bring truth and understanding to the physical
  world.