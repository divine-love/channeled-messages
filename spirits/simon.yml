spirit_id: simon
spirit_name: "Simon"
spirit_aliases: []
spirit_description: >
  Simon is a spirit who identifies himself simply as "Simon" and speaks as a
  friend and teacher to those gathered in Divine Love circles. His identity has
  not been confirmed in the messages; he may be Simon the Zealot, one of the
  twelve apostles of Jesus, though this has not been stated explicitly. In the
  Divine Love messages he appears as a warm and thoughtful teacher, particularly
  on the nature of being a channel of God's Love — distinguishing genuine soul
  openness from ego-driven assumptions about vocation, titles, and planning.
notes: >
  Identity unconfirmed. Possibly Simon the Zealot (apostle, mentioned in Luke
  6:15 and Acts 1:13), but not stated in the messages. To be updated if further
  messages provide clarification. First message: 2015-11-26-af-simon (On Being
  a Channel of God's Love: What It Is and What It Is Not).
  Identifies himself as a biblical figure and states his present condition: "I am Simon of the Bible and a resident of the Celestial Kingdom." Source: 2016-05-16-af-simon.