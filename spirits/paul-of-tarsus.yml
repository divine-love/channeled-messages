spirit_id: paul-of-tarsus
spirit_name: "Paul of Tarsus"
spirit_aliases: ["Paul", "Saul of Tarsus", "the Apostle Paul"]
spirit_description: >
  Paul of Tarsus (c. 5–67 AD) was the foremost missionary of early Christianity,
  author of many New Testament epistles, and perhaps the most influential figure
  in the spread of Jesus's teachings beyond the Jewish world. Originally a
  persecutor of Christians known as Saul, he experienced a dramatic conversion
  on the road to Damascus and devoted the rest of his life to proclaiming the
  gospel. In the Divine Love messages he speaks from spirit with clarity and
  authority, affirming the reality of Divine Love as the highest gift available
  to humanity, contrasting the natural love path with the Divine Love path to
  at-onement, and urging all souls to seek God's Essence without restriction.
notes: >
  Key biographical message: 2018-10-29-af-paul-of-tarsus (identifies himself
  as Paul of Tarsus and Paul of the Bible, speaks of the purpose of the soul
  and the two paths available to every soul, citing Jesus's words "seek ye the
  kingdom and all things shall come to you" as referring to the blessing of
  Divine Love).