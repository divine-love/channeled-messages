spirit_id: tahlia
spirit_name: "Tahlia"
spirit_aliases: []
spirit_description: >
  Tahlia is a Celestial spirit and a member of the prayer circle, sharing a
  place of origin with one of its members. Tahlia possessed the gift of
  healing during earth life and knew of it then; the gift has evolved,
  strengthened, and flourished through progression through the spheres of
  spirit into the Celestial Kingdom, a transformation Tahlia attributes to
  the Father's Love. Tahlia has committed to assisting the circle in the
  work of healing and in sowing the seeds of truth in the world.
notes: >
  Biographical details from 2016-12-01-af-tahlia (received in Punalu'u,
  Hawaii): a part of the circle, with a special bond with a member who
  comes from the same place Tahlia came from; possessed and knew of the
  gift of healing while on earth; the gift evolved and flourished through
  the spheres into the Celestial Kingdom; the Father's Love transformed
  Tahlia's soul and gifts. The place of origin is not named in the message.