spirit_id: yogananda
spirit_name: "Yogananda"
spirit_aliases: ["Paramahansa Yogananda", "Mukunda Lal Ghosh"]
spirit_description: "Paramahansa Yogananda (1893-1952), born Mukunda Lal Ghosh, was an Indian yogi and spiritual teacher who introduced millions of Westerners to the teachings of meditation and Kriya Yoga through his beloved autobiography and the Self-Realization Fellowship he founded in 1920. He established his ashram and sanctuary in Encinitas, California, where he lived and taught for many years. After passing, he describes arriving in the 4th sphere, carrying his Eastern religious beliefs, before progressing through the 5th, 6th, and 7th spheres of the natural love heavens. Upon releasing his erroneous mental beliefs he crossed into the Celestial Kingdom, describing the bliss of God's Love as beyond anything he experienced on Earth or in the natural love spheres. Now an inhabitant of the Celestial Heavens, he has confirmed that his teachings, though expressed in the language and tradition of his background, were always rooted in the same higher Truth of God's Love and soul awakening that the Divine Love messages convey. He acknowledges that he struggled with the integration of soul and mind during his Earth life, and continues to work for the awakening of humanity from spirit. He has expressed a deep desire to speak to many through the gift of Direct Voice mediumship."
