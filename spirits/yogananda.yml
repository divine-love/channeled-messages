spirit_id: yogananda
spirit_name: "Yogananda"
spirit_aliases: ["Paramahansa Yogananda", "Mukunda Lal Ghosh"]
spirit_description: "Paramahansa Yogananda (1893-1952), born Mukunda Lal Ghosh, was an Indian yogi and spiritual teacher who introduced millions of Westerners to the teachings of meditation and Kriya Yoga through his beloved autobiography and the Self-Realization Fellowship he founded in 1920. He established his ashram and sanctuary in Encinitas, California, where he lived and taught for many years. Now an inhabitant of the Celestial Heavens, he has confirmed that his teachings, though expressed in the language and tradition of his background, were always rooted in the same higher Truth of God's Love and soul awakening that the Divine Love messages convey. He continues to work for the awakening of humanity from spirit."
