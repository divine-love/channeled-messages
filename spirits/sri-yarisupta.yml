spirit_id: sri-yarisupta
spirit_name: "Sri Yarisupta"
spirit_aliases: ["Sri Yarigupta"]
spirit_description: >
  Sri Yarisupta is a Celestial Kingdom inhabitant who comes as a teacher and
  healer, speaking with particular knowledge of the many energies and
  dimensions of the healing arts. His formal name is Sri Yarigupta; Sri
  Yarisupta is a childhood familiar name he chose to use as a sign of
  friendship with those in the circle. He teaches that every soul has some
  degree of healing gift and that receiving Divine Love widens and deepens all
  healing capacities, opening a channel through which God may bring whatever
  colour and quality of healing a particular soul requires. He closes his
  messages with "Namaste." His Earth life background has not been revealed,
  though he mentions having lived in a culture with a language unfamiliar to
  Western ears.
notes: >
  Key biographical messages: 2019-01-26-af-sri-yarisupta (Questions Answered
  about Divine Love Healing); 2019-01-27-af-sri-yarisupta (What's in a Name?)
  — clarifies that Sri Yarigupta is his formal name and Sri Yarisupta a
  childhood familiar name. Identified as a Celestial Kingdom inhabitant and
  wonderful teacher and healer by Augustine in 2019-01-26-af-augustine.