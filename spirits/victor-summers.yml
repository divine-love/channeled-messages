spirit_id: victor-summers
spirit_name: Victor Summers
spirit_aliases: ["Victor"]
spirit_description: "A spirit who knew one of the circle members as a friend during his Earth life, where he carried out a ministry. He speaks of doubt as his great hindrance in that life, his own thinking having interfered with God's guidance and caused difficulties in his ministry. Now progressing through the Seventh Sphere on the doorstep of the Celestial Kingdom, almost fully redeemed through the Father's Divine Love, he comes to encourage seekers to set aside doubt and feelings of unworthiness and to carry on the Divine Love work begun through James Padgett and Jesus."
