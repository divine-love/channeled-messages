spirit_id: marjorie-fike
spirit_name: "Marjorie"
spirit_aliases: []
spirit_description: >
  Marjorie is the mother of medium Al Fike, now in spirit. She has spoken through
  her son to offer grandmotherly love, encouragement, and guidance from the spirit
  world. In spirit she found the understanding and peace that eluded her in her
  Earth life, and she speaks with warmth and compassion to those who struggled as
  she once did.
notes: >
  Key biographical message: 2015-07-20-af-marjorie-fike (identifies herself as
  Al Fike's mother, speaks of her own struggles in Earth life, and confirms she
  is now in spirit offering love and support to her grandson).

  Speaks as a relative (aunt) of the message's recipient and describes her own progression in spirit: "My journey started out poorly but I am now gloriously happy and I know the wonders of my Heavenly Father's Love." Source: 2016-06-04-af-marjorie-fike.