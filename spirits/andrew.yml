spirit_id: andrew
spirit_name: "Andrew"
spirit_aliases: ["Andrew the Apostle", "Saint Andrew"]
spirit_description: >
  Andrew was one of the twelve apostles of Jesus and the brother of Simon
  Peter. A fisherman by trade, he was among the first to be called by Jesus
  and is traditionally regarded as the first apostle. Now an inhabitant of
  the Celestial Kingdom, he identifies himself as a disciple of the Master,
  Jesus. In the Divine Love messages he is one of the most frequent and
  versatile presences in the archive — delivering messages on service,
  mission, the two paths, soul healing, forgiveness, and the nature of
  Divine Love. He identifies himself as Al Fike's personal guide of many
  years. His tone is consistently warm, direct, and deeply pastoral, with
  a particular gift for compassionate challenge — calling those gathered to
  greater courage, honesty, and commitment while affirming their belovedness
  at every turn.
notes: >
  Andrew identifies himself as Al Fike's personal guide in
  2018-07-08-af-andrew (Choose to Awaken Your Soul Through Prayer for
  Divine Love). Identifies himself as an inhabitant of the Celestial
  Kingdom and a disciple of Jesus in 2019-01-13-af-andrew (The Fate of
  This World Rests Upon Each Soul's Choice).