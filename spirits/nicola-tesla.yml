spirit_id: nikola-tesla
spirit_name: "Nikola Tesla"
spirit_aliases: ["Nicola Tesla"]
spirit_description: "Nikola Tesla (1856-1943), the Serbian-American inventor, electrical engineer, and futurist, is best known for his contributions to the design of the modern alternating current electricity supply system and his pioneering work on wireless transmission of energy. In the Divine Love messages, Tesla speaks from spirit with characteristic enthusiasm about the mechanics of the universe, describing how his understanding of energy and electricity has been deepened and expanded since passing. He has expressed a keen interest in assisting with the development of Direct Voice mediumship, which he understands to have an electrical component, and has spoken of the power of Divine Love as the most fundamental energy in the universe - one whose capacities far exceed what humanity has yet understood."
