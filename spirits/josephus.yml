spirit_id: josephus
spirit_name: "Josephus"
spirit_aliases: ["Flavius Josephus"]
spirit_description: >
  Josephus is Flavius Josephus (c. 37 - c. 100 AD), the first-century
  Romano-Jewish scholar and historian. He describes himself as a philosopher
  and teacher of the Jewish faith who helped to formulate the scriptures of
  that religion. He now resides within the Celestial Kingdom and follows the
  teachings of Jesus, whom he calls the Messiah of Israel. He describes himself
  as having studied in detail the composition and faculties of the soul, and
  speaks with the care of a teacher translating a difficult subject into terms
  the mind can grasp.
notes: >
  Biographical details from 2019-02-01-af-josephus: identifies himself as a
  philosopher and teacher of the Jewish faith who helped to formulate its
  scriptures; states he now resides in the Celestial Kingdom and follows Jesus,
  the Messiah of Israel; describes himself as having studied in detail the
  composition and faculties of the soul. He indicated he may return to expound
  further on the faculties of the soul. Note: his statement that he helped to
  formulate Jewish scripture extends the conventional historical record of
  Flavius Josephus, who is known as a chronicler and historian rather than a
  composer of scripture. Recorded as stated in the message.