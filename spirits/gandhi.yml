spirit_id: gandhi
spirit_name: "Mahatma Gandhi"
spirit_aliases: ["Gandhi", "Mohandas Gandhi", "Mohandas Karamchand Gandhi"]
spirit_description: "Mahatma Gandhi (1869–1948), Indian independence leader, philosopher, and advocate of nonviolent resistance, who led the movement for Indian independence from British rule and inspired civil rights movements worldwide. He held a firm belief in God throughout his life, though by his own account his understanding of God's Love was not as clear while on Earth as it became after passing. Now a resident of the Celestial Kingdom, he communicates in the Divine Love messages as a passionate encourager of those working to bring spiritual awakening, compassion, and service to the world."
