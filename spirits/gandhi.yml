spirit_id: gandhi
spirit_name: "Mahatma Gandhi"
spirit_aliases: ["Gandhi", "Mohandas Gandhi", "Mohandas Karamchand Gandhi"]
spirit_description: >
  Mahatma Gandhi (1869–1948), Indian independence leader, philosopher, and
  advocate of nonviolent resistance, who led the movement for Indian
  independence from British rule and inspired civil rights movements worldwide.
  He held a firm belief in God throughout his life, following God's guidance
  one step at a time and accepting the responsibility he carried to bring
  change to his country and be an example for all peoples. By his own account,
  he fulfilled his purpose and destiny in the world, and on passing into spirit
  his joy and sense of fulfillment overflowed in deep gratitude to God. He
  continues to grow in the Light and Love of God, and now inhabits the
  Celestial Kingdom. In the Divine Love messages he speaks as a passionate
  encourager of those working to bring spiritual awakening, compassion, and
  service to the world — drawing direct parallels between his own Earth life
  journey and the work of those gathered.
notes: >
  Key biographical message: 2018-05-10-af-gandhi (Change Comes One Soul at
  a Time) — Gandhi's most personal disclosure, describing his Earth life,
  passing, and current state in spirit.