spirit_id: luke
spirit_name: "Luke"
spirit_aliases: ["Luke the Evangelist", "Saint Luke"]
spirit_description: "Luke the Evangelist (c. 1st century AD), traditionally identified as the author of the Gospel of Luke and the Acts of the Apostles, and a companion of the apostle Paul. A physician by profession, he is known for his compassionate portrayal of Jesus and particular attention to healing, the poor, and the marginalized. Now a celestial spirit and communicator in the Divine Love messages, he is described by Confucius as a teacher of joy and happiness."
notes: "First appears by reference in 2016-02-29-af-confucius, where Confucius mentions 'our brother, Luke' as having spoken about joy and happiness. Spirit file created at that point; further details to be added as more messages emerge."