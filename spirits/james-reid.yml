spirit_id: james-reid
spirit_name: "James Reid"
spirit_aliases: []
spirit_description: >
  James Reid is a progressing spirit who dwells in the fifth sphere and
  describes himself as not yet a Celestial Angel but well on the way. He
  knew the truth of Divine Love during his earth life and is grateful that
  he understood the foundation of love while in the world, though he
  immersed his mind in the details of spirit life and the purpose of life
  through reading and discussion; from spirit he sees that much of that
  detail was clutter around the simple, powerful truth of God's Love. He
  has committed himself to supporting the circle and those who pray for
  Divine Love and bring its knowledge to the world.
notes: >
  Biographical details from 2016-11-27-af-james-reid (received in Hawaii):
  dwells in the fifth sphere, learning and progressing; changed some of his
  beliefs and attitudes upon entering spirit; in earth life read, discussed,
  and shared extensively about the life of spirit and the meaning of life;
  understood the foundation of love while in the world; names a living
  friend, Geoff, as his staunch supporter and dear friend. Notes that the
  medium lowered a barrier to allow spirits who are not yet Celestial
  Angels to speak.