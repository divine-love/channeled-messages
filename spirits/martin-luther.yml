spirit_description: "Martin Luther (1483–1546), the German theologian and Augustinian monk whose Ninety-Five Theses sparked the Protestant Reformation, challenging the authority of the Catholic Church and reshaping Christianity in the Western world. Now a celestial spirit, he is a passionate advocate for aligning with God's Will above the will of man, drawing on his own earthly experience of opposition and persistence in service."
