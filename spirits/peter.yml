spirit_id: peter
spirit_name: "Peter"
spirit_aliases: ["Simon Peter", "Saint Peter", "Peter the Apostle"]
spirit_description: >
  Peter was the most prominent of the twelve apostles of Jesus — a fisherman
  from Galilee, brother of Andrew, and the one upon whom Jesus declared he
  would build his church. His journey from impulsive denier to rock of the
  early church is one of the most dramatic in scripture. In the Divine Love
  messages he appears as a bold, passionate, and deeply loving presence,
  delivering some of the archive's most urgent prophetic and missionary
  messages. He calls those gathered to step into greater service, to form
  new prayer groups, and to prepare for significant spiritual work ahead.
  His tone carries the directness and warmth of a leader who has himself
  been transformed by love.
