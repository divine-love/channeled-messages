spirit_id: peter
spirit_name: "Peter"
spirit_aliases: ["Simon Peter", "Peter the Rock", "Cephas"]
spirit_description: "Peter (d. c. 64–68 AD), born Simon, was one of the twelve apostles of Jesus and is considered the first leader of the early Christian church. Called 'the Rock' by Jesus, he was known for his passionate faith, his human frailties, and his ultimate transformation into a fearless witness of the risen Christ. Now a high celestial spirit, he communicates in the Divine Love messages as a strong, encouraging teacher, calling souls to discover and fulfill their God-given purpose and walk boldly in God's Love."
notes: ""