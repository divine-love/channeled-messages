spirit_id: faith-nyquist
spirit_name: "Faith Nyquist"
spirit_aliases: ["Faith"]
spirit_description: >
  Faith Nyquist was a devout soul whose Earth life was marked by sincere
  faith and prayer. In the Divine Love circles she appears as a gentle,
  encouraging, and deeply loving presence — speaking tenderly to those
  gathered as they grow in prayer, affirming their progress, and assuring
  them that God is never disappointed in them. She identifies herself simply
  as "Faith" and expresses deep personal love for those in the circles,
  describing herself as often with them.
notes: >
  The word "faith" as a concept keyword is never removed from message
  keywords on account of this spirit — only her name as a proper noun
  is excluded from keywords in messages she delivers.