spirit_id: faith-nyquist
spirit_name: "Faith Nyquist"
spirit_aliases: ["Faith"]
spirit_description: >
  Faith Nyquist was a devout soul whose Earth life was dedicated to following
  God's Will, which took her on what she describes as a great and beautiful
  journey of Love. Though she knew of God's Love and lived within His care
  and Light, she did not fully understand the power of Divine Love as those
  in the current circles do. Her great challenge during her Earth life was to
  be heard, seen, and acknowledged as she went about her Father's Will and
  work — a struggle she names candidly and draws on to encourage those facing
  similar difficulties in bringing Light into the world. She passed into
  spirit not long before the messages began and now resides in the Celestial
  Kingdom. In the Divine Love circles she appears as a gentle, encouraging,
  and deeply loving presence, speaking tenderly to those gathered as they grow
  in prayer, affirming their progress, and assuring them that God is never
  disappointed in them. She identifies herself simply as "Faith" and expresses
  deep personal love for those in the circles, describing herself as often with
  them and working to bring Light, Love, truth, and comfort into the world.
notes: >
  Biographical details from 2015-08-20-af-faith-nyquist: confirms she walked
  the Earth "not too long ago," dedicated her life to following God's Will,
  did not fully understand Divine Love during her Earth life, and now resides
  in the Celestial Kingdom. The word "faith" as a concept keyword is never
  removed from message keywords on account of this spirit — only her name
  as a proper noun is excluded from keywords in messages she delivers.
  Additional biographical detail from 2015-11-09-af-faith: Faith discloses
  that her great Earth life challenge was to be heard, seen, and acknowledged
  while doing God's work.