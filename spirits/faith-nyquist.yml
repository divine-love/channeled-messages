spirit_id: faith
spirit_name: "Faith"
spirit_aliases: ["Faith Nyquist"]
spirit_description: "Faith is a celestial spirit who communicates actively in the Divine Love messages. In her Earth life she was a devout and courageous soul who followed her spiritual guidance boldly, believing it to be God's Will. She possessed God's Love while on Earth and lived it deeply, though by her own account she did not fully articulate the Truth of Divine Love with clarity, as her mind was occupied with other concerns and religious indoctrinations of her time. She is known in the messages for her gentle encouragement and instruction around humility, faith, compassion, and the free expression of the soul."