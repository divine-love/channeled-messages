spirit_id: john-the-beloved
spirit_name: "John the Beloved"
spirit_aliases: ["John"]
spirit_description: "John the Beloved (c. 6–100 AD), one of the twelve apostles of Jesus and traditionally identified as the author of the Gospel of John, the three Epistles of John, and the Book of Revelation. Now a high celestial spirit and one of the most frequent and tender communicators in the Divine Love messages, offering encouragement, blessing, and deep spiritual instruction."
