spirit_id: john-the-beloved
spirit_name: "John the Beloved"
spirit_aliases: ["John", "John the Apostle", "John the Evangelist"]
spirit_description: >
  John the Beloved was one of the twelve apostles of Jesus and is traditionally
  identified as the author of the Gospel of John, the three Letters of John,
  and the Book of Revelation. He was the apostle described as the one Jesus
  loved, and the only apostle present at the crucifixion. In the Divine Love
  messages he appears as a deeply lyrical and contemplative teacher, delivering
  some of the archive's most evocative teachings on the soul's longing for
  God, the nature of Divine Love, and the invitation to at-onement. He speaks
  with great tenderness and depth, often using rich imagery — bees seeking
  nectar, living waters, the fountainhead of all love — to convey the
  inexpressible reality of God's Love. He is a frequent and beloved presence
  in the circles.
