spirit_id: jesus
spirit_name: "Jesus of Nazareth"
spirit_aliases: ["Jesus", "Jeshu", "Jeshua", "Jesus the Christ", "Jesus Christ", "the Master"]
spirit_description: >
  Jesus of Nazareth (c. 4 BC - c. 30 AD), the central figure of Christianity
  and bearer of the message of God's Divine Love to humanity. Now residing in
  the highest realms of the Celestial Kingdom, which he was the first soul to
  enter, he continues to guide and teach through the Divine Love messages,
  affirming the path of at-onement with God through the inflowing of Divine
  Love. He identifies himself as a brother and friend to all who seek truth,
  and teaches that he will never return to Earth in the flesh, as this would
  contravene the laws of creation in which progression moves eternally forward
  and never regresses. He comes instead in his spirit body to speak to the
  world and continues to teach his message of God's Love. He cautions that
  many spirits impersonate him, often through well-meaning but undiscerning
  mediums, and that only a soul awakened by Divine Love can discern his true
  presence from these errors.
notes: >
  Key biographical and doctrinal disclosures from 2018-11-26-af-jesus
  (Clarification on the Existence of Jesus): Jesus confirms he was the first
  soul to enter the Celestial Kingdom and resides in its highest realms;
  states he will never return in the flesh as this contravenes the laws of
  creation; teaches that widespread spirit impersonation of his name is common
  and often unintentional; and affirms that God's Love is equal in intensity
  for every soul.