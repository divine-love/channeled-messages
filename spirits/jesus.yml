spirit_id: jesus
spirit_name: "Jesus of Nazareth"
spirit_aliases: ["Jesus", "Jeshu", "Jeshua", "Jesus the Christ", "Jesus Christ", "the Master"]
spirit_description: >
  Jesus of Nazareth (c. 4 BC - c. 30 AD), the central figure of Christianity
  and bearer of the message of God's Divine Love to humanity. Now residing in
  the highest realms of the Celestial Kingdom, which he was the first soul to
  enter, he continues to guide and teach through the Divine Love messages,
  affirming the path of at-onement with God through the inflowing of Divine
  Love. He identifies himself as a brother and friend to all who seek truth,
  and teaches that he will never return to Earth in the flesh, as this would
  contravene the laws of creation in which progression moves eternally forward
  and never regresses. He comes instead in his spirit body to speak to the
  world and continues to teach his message of God's Love. He cautions that
  many spirits impersonate him, often through well-meaning but undiscerning
  mediums, and that only a soul awakened by Divine Love can discern his true
  presence from these errors. By prior agreement with God, he incarnated as a
  complete and singular soul rather than as half of a soul pair, as is the case
  with all other souls. Mary Magdalene was not his soulmate. He has no soulmate
  and feels no lack in this, as his love for all of humanity and his union with
  God bring complete fulfillment. He continues to grow in God's Love from the
  highest Celestial realm and remains the sole inhabitant of that place.
notes: >
  Key biographical and doctrinal disclosures from 2018-11-26-af-jesus
  (Clarification on the Existence of Jesus): Jesus confirms he was the first
  soul to enter the Celestial Kingdom and resides in its highest realms;
  states he will never return in the flesh as this contravenes the laws of
  creation; teaches that widespread spirit impersonation of his name is common
  and often unintentional; and affirms that God's Love is equal in intensity
  for every soul. Further biographical disclosure from 2019-01-27-af-jesus
  (Jesus Incarnated as a Complete Soul and Has No Other Half or Soulmate):
  Jesus confirms he incarnated as a complete soul by agreement with God, that
  Mary Magdalene was not his soulmate, and that he has no soulmate and no need
  of one.
  Biographical details given by Mary, Mother of Jesus, in 1963-12-26-ds-mary
  (received through Dr. Daniel Samuels): called Jeshua or Jeshu; born
  naturally, the eldest of eight children, with no one in the family having
  any inkling of his future role; a serious, studious, pious child who drank
  eagerly at the fountainhead of religious instruction; by age twenty
  wondering whether he himself was the promised Messiah; his natural love
  purified and deepened into Divine Love through prayer, absorbing the young
  man's natural turn toward marriage and family; counselled peace and
  forbearance while his brothers were drawn to rebellion against Rome; the
  family believed him deranged when he spoke of God's Soul Quality within
  his own being. Mary describes his Messiahship as attained through the
  inflowing of God's Love, which made him, in time, God's real, only
  begotten son, and his death as the sacrifice of his life to carry out his
  mission of preaching God's Divine Love, not a blood sacrifice.
  In 2016-04-02-af-jesus (Jesus' Ministry and the Teachings of Divine Love),
  Jesus corrects the doctrine of the vicarious atonement in his own words,
  stating that nothing could be further from the truth than that his death
  and blood could save humanity, an interpretation that has wrought much
  pain and error in the world. He discloses that he incarnated with the
  unique attribute of a purified soul, protected by God from the conditions
  of the world, for the purpose of re-opening the door to receiving God's
  Love within the souls of mankind; that he taught this message in allegory
  and stories; and that his words "Seek ye the Kingdom" mean: seek God's
  Love, which will create the Kingdom within you.