spirit_id: jesus
spirit_name: "Jesus of Nazareth"
spirit_aliases: ["Jesus", "Jeshu", "Jeshua", "Jesus the Christ", "Jesus Christ", "the Master"]
spirit_description: "Jesus of Nazareth (c. 4 BC – c. 30 AD), the central figure of Christianity and bearer of the message of God's Divine Love to humanity. Now the Master of the Celestial Heavens and the most spiritually advanced soul in creation, he continues to guide and teach through the Divine Love messages, affirming the path of at-onement with God through the inflowing of Divine Love."
