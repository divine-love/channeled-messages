spirit_id: goldie
spirit_name: "Goldie"
spirit_aliases: []
spirit_description: >
  Goldie is a Celestial spirit whose Earth life background has not been
  revealed in the messages. She is one of the most distinctive presences in
  the Divine Love circles, characterized by exuberant joy, warmth, playfulness,
  and an infectious delight in the beauty of ordinary life. She speaks of
  daffodils, gardens, birds, and laughter, and encourages those gathered to
  embrace joy as a spiritual practice rather than something to be earned.
  She identifies herself as a close friend and companion to Al Fike, promising
  to be with him in prayer and to walk and sing with him as he works. She
  describes her presence as felt in the lightness of a step and the joy in
  the heart.
