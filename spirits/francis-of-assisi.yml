spirit_id: francis-of-assisi
spirit_name: "Francis of Assisi"
spirit_aliases: ["Francis", "Saint Francis"]
spirit_description: "Francis of Assisi (1181–1226), Italian mystic and founder of the Franciscan Order, renowned for his radical embrace of poverty, love of nature, and care for all of God's creatures. Now a celestial spirit, he communicates in the Divine Love messages as a gentle advocate for loving all of creation — people, creatures, and the Earth itself — as an expression of God's Love."
