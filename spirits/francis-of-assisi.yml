spirit_id: francis-of-assisi
spirit_name: "Francis of Assisi"
spirit_aliases: ["Francis", "Saint Francis"]
spirit_description: "Francis of Assisi (1181–1226), Italian mystic and founder of the Franciscan Order, renowned for his radical embrace of poverty, love of nature, and care for all of God's creatures. In the Divine Love messages he confirms his own account: he walked away from material wealth and comfort to commune with God, going from ease and power to aloneness and innocence, finding that in doing so his gifts flourished, he found contentment and joy, and he came to know God deeply. He describes gaining the world by giving it up. Now a Celestial spirit, he communicates in the Divine Love messages as a gentle advocate for loving all of creation — people, creatures, and the Earth itself — as an expression of God's Love."
notes: >
  Biographical details confirmed in 2015-08-20-af-francis-of-assisi: walked
  away from material wealth and comfort to follow God's Will; went from wealth
  to poverty and from ease and power to aloneness and innocence; his gifts
  flourished and he found contentment, joy, and deep knowledge of God.
  Further detail in 2016-01-28-af-francis-of-assisi: he communed directly with
  the animals and plants of God's creation, and lived a humble itinerant life,
  walking to many places and reaching out to many souls as a channel of Love.