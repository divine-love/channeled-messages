spirit_id: isaiah
spirit_name: "Isaiah"
spirit_aliases: ["Isaiah of Jerusalem"]
spirit_description: >
  Isaiah was a Hebrew prophet active in Jerusalem during the eighth century BC,
  whose writings form the biblical Book of Isaiah. He is known for his sweeping
  prophetic vision, his proclamations of God's holiness and sovereignty, and his
  tender passages of comfort and hope for a suffering people. He foresaw a coming
  servant of God who would bring justice and healing to the nations. In the Divine
  Love messages, Isaiah speaks with the cadence of a prophet, carrying forward
  his earthly calling to declare God's breath and will at work in the world.
