spirit_id: seretta-kem
spirit_name: "Seretta Kem"
spirit_aliases: ["Seretta"]
spirit_description: "Seretta Kem was a son of Ramses II, Pharaoh of Egypt (c. 1303–1213 BC), and brother of Keea atta Kem. Now a beautiful celestial spirit, he is known in the Divine Love messages as a gentle healer and channel of God's healing blessings, supporting those who are gifted in healing and assisting them to bring comfort and restoration to injured souls."
