spirit_id: seretta-kem
spirit_name: "Seretta Kem"
spirit_aliases: ["Seretta"]
spirit_description: >
  Seretta Kem was a son of Ramses II, Pharaoh of Egypt (c. 1303–1213 BC), and
  brother of Keea Atta Kem. He identifies himself as a healer and a chemist who
  lived in Egypt many thousands of years ago. Now an inhabitant of the Celestial
  Kingdom, he works with those mortals who desire to develop their spiritual gifts
  and who walk the path of Divine Love, actively mixing chemicals and energies in
  the spirit world to help souls realize the gifts and potentials within them. He
  is known in the Divine Love messages as a gentle teacher of healing and
  mediumship, a guardian of Circles of Light, and a guide for those seeking to
  elevate their natural gifts through the power of Divine Love.
notes: >
  Key biographical messages: 2015-03-29-af-seretta-kem (identifies himself as
  having lived in Egypt at the peak of that civilization, confirms Celestial
  Kingdom); 2016-04-13-af-seretta-kem (The Greatest Healing Energy of All Is
  God's Divine Love); 2018-08-28-af-seretta-kem (identifies himself explicitly
  as a healer and chemist, describes mixing chemicals and energies to assist
  those developing spiritual gifts).