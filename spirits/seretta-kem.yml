spirit_id: seretta-kem
spirit_name: "Seretta Kem"
spirit_aliases: []
spirit_description: >
  Seretta Kem lived in ancient Egypt when that civilization was at its peak,
  and has studied the art of healing for a very long time. He is the son of
  Ramses II and brother of Keea atta Kem. He walks the Divine Path and
  inhabits the Celestial Kingdom. In the Divine Love messages he appears as
  a healer and teacher, delivering some of the archive's most detailed
  teachings on soul expiation, the mechanics of healing, and the primacy of
  Divine Love as the greatest healing force available to humanity. He is a
  regular presence in the circles and has strong ties to those developing
  mediumship and healing gifts.
notes: >
  Key biographical message: 2015-03-29-af-seretta-kem (identifies himself as
  having lived in Egypt at the peak of that civilization, confirms Celestial
  Kingdom). Also: 2016-04-13-af-seretta-kem (The Greatest Healing Energy of
  All Is God's Divine Love).