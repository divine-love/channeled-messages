spirit_id: stephen
spirit_name: "Stephen"
spirit_aliases: ["Saint Stephen", "St. Stephen", "Stephen the Protomartyr"]
spirit_description: >
  Stephen was one of the first deacons of the early Christian church and is
  remembered as the first Christian martyr, whose testimony before the
  Sanhedrin and death by stoning are recorded in the Acts of the Apostles. A man
  described as full of faith and grace, he was known for his bold witness to the
  truth as he understood it. In the Divine Love messages he speaks as a
  Celestial spirit, encouraging those gathered to trust the insights and visions
  God brings to the soul and to prepare for service in the world.
