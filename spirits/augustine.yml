spirit_id: augustine
spirit_name: "Augustine"
spirit_aliases: ["Augustine of Hippo", "Saint Augustine", "Bishop Augustine"]
spirit_description: >
  Augustine of Hippo (354–430 AD) was one of the most influential theologians
  in the history of Christianity, serving as bishop of Hippo in North Africa
  and shaping the doctrine of the early church through works such as
  Confessions and City of God. In the Divine Love messages, Augustine candidly
  acknowledges that in playing a major role in developing the church of Christ
  he encouraged many erroneous beliefs and understandings of Jesus's true
  message — a responsibility he now works to correct. After entering spirit he
  discovered the Truth of Divine Love, prayed earnestly to receive it, ascended
  through the spirit spheres, and entered the Celestial Kingdom. He now serves
  as a primary teacher in the Divine Love circles, speaking more frequently
  than any other spirit in the archive, and addresses those gathered as his
  beloved students with great warmth, depth, and theological precision.
notes: >
  Key biographical message: 2016-03-30-af-augustine (most personal disclosure,
  confesses teaching error still persisting in the church) and
  2015-03-28-af-augustine (identifies himself as bishop of Hippo, describes
  his own ascension into the Celestial Kingdom).