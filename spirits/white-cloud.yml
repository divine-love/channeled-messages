spirit_id: white-cloud
spirit_name: "White Cloud"
spirit_aliases: []
spirit_description: "White Cloud is a Native American celestial spirit who communicates regularly in the Divine Love messages with gentle authority on matters of world healing, prayer, and the expression of God's Love in daily life. He addresses all as brothers and sisters, reflecting a deep sense of universal kinship with all of humanity and the Earth itself. He speaks with particular compassion for those who struggle in the world and calls all who carry the truth of God's Love to express it with dignity, humility, and gentleness."
