spirit_id: white-cloud
spirit_name: "White Cloud"
spirit_aliases: []
spirit_description: >
  White Cloud is a Native American celestial spirit who communicates regularly
  in the Divine Love messages with gentle authority on matters of world healing,
  prayer, and the expression of God's Love in daily life. He addresses all as
  brothers and sisters, reflecting a deep sense of universal kinship with all of
  humanity and the Earth itself. He speaks with particular compassion for those
  who struggle in the world and calls all who carry the truth of God's Love to
  express it with dignity, humility, and gentleness. He refers to God as the
  Great White Spirit, reflecting his Indigenous spiritual tradition. He has been
  a lifelong guide to Barbara, a longtime prayer circle host in West Vancouver,
  and also watches over Al Fike.
notes: >
  Biographical detail from 2015-11-25-af-white-cloud (Be Warriors of Light):
  White Cloud identifies himself as having been with Barbara all of her life,
  supporting her spiritual quest; describes her West Vancouver home as a beacon
  of Light for many years; and states he also watches over Al Fike.