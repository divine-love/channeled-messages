spirit_id: keea-atta-kem
spirit_name: Keea Atta Kem
spirit_aliases: ["Keea"]
spirit_description: >
  Keea atta Kem lived in ancient Egypt as the daughter of Ramses II and sister
  of Seretta Kem. She inhabits the Celestial Kingdom and is a regular and
  deeply committed presence in the Divine Love circles, serving as a healer,
  teacher, and guide in the development of soul gifts and mediumship. She
  expresses deep personal love for those in the circles, often closing her
  messages with warm and repeated terms of endearment. In the messages she
  teaches on the nature of the soul, the unfolding of gifts in God's timing,
  the importance of physical gatherings, and the responsibility that comes
  with spiritual sensitivity. She has committed to always accompanying the
  circle, helping to mark progress, open souls to express their beauty, and
  assist in the development of many gifts.
notes: >
  Key biographical message: 2016-04-04-af-keea-atta-kem (The Prism of Our
  Souls) — anchor message for the Prism of the Soul series. Also:
  2018-07-13-af-keea-atta-kem where she explicitly commits to always being
  with the circle.