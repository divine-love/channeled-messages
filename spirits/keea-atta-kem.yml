spirit_id: keea-atta-kem
spirit_name: "Keea atta Kem"
spirit_aliases: ["Keea"]
spirit_description: "Keea atta Kem was a daughter of Ramses II, Pharaoh of Egypt (c. 1303–1213 BC), now a high celestial spirit and one of the most actively engaged guides in the Divine Love prayer circles. She communicates with great tenderness and clarity, consistently calling souls to release the dominance of the material mind and find their true home in the sacred place of the soul where God's Love heals, guides, and transforms."
