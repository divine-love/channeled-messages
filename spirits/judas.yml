spirit_id: judas
spirit_name: "Judas of Kerioth"
spirit_aliases: ["Judas", "Judas Iscariot"]
spirit_description: "Judas of Kerioth, the apostle who betrayed Jesus, now a celestial spirit whose own redemption through Divine Love stands as a testament to its transforming power for every soul."
notes: >
  Biographical detail from 2016-03-31-af-judas: Judas discloses that the motive
  behind his betrayal was a naive belief that Jesus would overthrow the
  oppressors and become the earthly ruler and king of their land; he describes
  his horror at the crucifixion that followed, and the grief shared among the
  disciples. He also refers to the book bearing his name, "Judas of Kerioth"
  (received from 2001 onward through an anonymous medium and published via
  new-birth.net). His redemption from the Hells to the Celestial
  Kingdom through Divine Love is recounted in 2014-10-11-af-judas and in Andrew's
  account of helping him (2018-03-02-af-andrew).