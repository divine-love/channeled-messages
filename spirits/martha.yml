spirit_id: martha
spirit_name: "Martha"
spirit_aliases: ["Martha of Bethany"]
spirit_description: >
  Martha is a biblical spirit, traditionally identified as Martha of Bethany,
  sister of Mary and Lazarus, and a close friend of Jesus during his Earth
  life. In the Divine Love messages she appears as a warm and encouraging
  presence, speaking with particular tenderness to prayer groups and
  assuring individuals that spirit will communicate with each soul in ways
  uniquely suited to their own gifts and receptivity.
notes: >
  Key message: 2019-01-20-af-martha (Be Open and Receptive to What We May
  Give to Each One of You).