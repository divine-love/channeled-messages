spirit_id: brother-mandus
spirit_name: "Brother Mandus"
spirit_aliases: ["Mandus Nyquist", "Beaumont Nyquist Mandus"]
spirit_description: "Beaumont Nyquist Mandus (1888–1988), widely known as Brother Mandus, was a prominent English spiritual teacher, healer, and leading exponent of the New Thought Movement. Born in Hartlepool, England, he founded the World Healing Crusade (now the World Healing Centre) in 1948, headquartered at Mandus House in Blackpool, where he served until his death at age 100. He authored numerous books including The Christ Within and Power Thinking, published the free monthly magazine Crusader, and delivered inspired speeches to large audiences worldwide. He viewed his work as 'positive Christianity' bridging New Thought principles with orthodox church tradition. By his own account in the Divine Love messages, he acknowledges that while his heart understood simple Truths of Love and Grace, he was also enthralled with his own image and worked in ways of the mind — not yet fully grasping the deeper Truth of Divine Love. Now an inhabitant of the Celestial Kingdoms, he communicates in the messages with particular concern for the ongoing work at the World Healing Centre and the souls who gather there."
notes: "Possible connection to Faith Nyquist through the Nyquist surname — to be confirmed if addressed in future messages. Son Conrad Nyquist continued the healing services after his death. The World Healing Centre sold its Blackpool headquarters in 2024 and reinvented its operations. His daughter-in-law is Faith Nyquist. 2016-06-27-af-faith-nyquist Faith refers to 'my father-in-law'"