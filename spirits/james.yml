spirit_id: james
spirit_name: "James"
spirit_aliases: ["James the Apostle", "James the Greater", "James son of Zebedee"]
spirit_description: "James the Apostle (d. c. 44 AD), son of Zebedee and brother of John the Beloved, one of the twelve apostles of Jesus and the first apostle to be martyred. Known in the Gospels as one of the inner circle of Jesus alongside Peter and John, he was present at the Transfiguration and in Gethsemane. Now a celestial spirit and communicator in the Divine Love messages, he speaks with warmth and tenderness on themes of soul identity, the gift of incarnation, and service."
