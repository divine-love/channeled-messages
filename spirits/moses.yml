spirit_id: moses
spirit_name: "Moses"
spirit_aliases: ["Moses the Lawgiver"]
spirit_description: "Moses (c. 13th century BC), the great Hebrew prophet and lawgiver of the Old Testament, led the Israelites out of slavery in Egypt and received the Ten Commandments on Mount Sinai. His life was defined by long and arduous journeys undertaken in reliance on God's guidance. Now a celestial spirit residing in the Celestial Heavens, he communicates in the Divine Love messages both as an encouraging presence drawing on his own experience of journeying in faith, and as a teacher who speaks with candour about the errors of religious tradition — including the sacrificial system he himself established — calling souls to seek God's Love directly rather than through inherited religious constructs."
