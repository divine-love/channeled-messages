spirit_description: "Moses, the great Hebrew prophet and lawgiver of the Old Testament, led the Israelites out of slavery in Egypt and received the Ten Commandments on Mount Sinai. His life was defined by long and arduous journeys undertaken in reliance on God's guidance. Now a celestial spirit residing in the Celestial Heavens, he communicates in the Divine Love messages as an encouraging presence, drawing on his own experience of journeying in faith to inspire those navigating their own spiritual path."
