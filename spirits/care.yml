spirit_id: care
spirit_name: "Care"
spirit_aliases: []
spirit_description: >
  Care is the soulmate of medium Rev. Jimbeau Walsh, speaking from the world
  of spirit. She joins the circle in its prayers, prays daily for each of
  its members, and encourages the group to release their expectations and
  allow God to orchestrate their efforts, teaching that God's plan unfolds
  like a rose opening one petal at a time. Yogananda describes the medium's
  life with Care, among others, as teaching him the truths of Divine Love
  over more than thirty years.
notes: >
  Delivers 2016-11-29-af-care (received in Hawaii), addressing her mate,
  identified in a transcriber note as J.W. and confirmed by the curator as
  Rev. Jimbeau Walsh. She states she is with him often, joins the circle's
  prayers, and prays for each member every day. Also named in
  2019-04-01-jw-yogananda, in which Yogananda speaks of the medium's path
  leading him to his beautiful soulmate and of his life with his dear Care.