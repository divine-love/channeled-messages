spirit_id: aman
spirit_name: "Aman"
spirit_aliases: ["Adam", "the First Father", "the First Parent"]
spirit_description: "Aman, known in the Biblical tradition as Adam, identifies himself as the first parent of humanity — the progenitor of all human souls — who has lived for many thousands of years in spirit and has been witness to countless generations of souls in both the flesh and spirit worlds. His soul mate is Amon, known in the Biblical tradition as Eve. Now residing together in the Celestial Heavens, he communicates in the Divine Love messages with great authority on matters of the soul's journey, the purpose of physical life, the progression through the spirit planes, and the question of reincarnation."
