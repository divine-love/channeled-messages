spirit_id: aman
spirit_name: "Aman"
spirit_aliases: ["Adam"]
spirit_description: >
  Aman is the biblical Adam — the first parent of humanity, created by God
  with a soul pure and without sin. In the Divine Love messages he gives a
  detailed first-person account of the original state of humanity: bodies
  perfectly proportioned and without disease, minds keen and clear, souls
  untainted, living in paradise without the need to forage or exert effort
  to survive. He describes the fall from grace as resulting from a choice
  made in free will that turned humanity away from God, and carries deep
  regret for having sowed the seeds of millennia of disharmony. His soul
  mate is Amon (the biblical Eve). Aman now inhabits the higher spirit spheres and speaks with great
  wisdom, humility, and love for all his children.
notes: >
  Key biographical message: 2016-05-29-af-aman (Aman Speaks of the Original
  State of Humanity and the Fall from Grace). Also: 2015-10-26-af-aman
  (The First Father Talks about Reincarnation and the Progression of Life).