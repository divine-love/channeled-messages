medium_id: jimbeau-walsh
medium_name: "Rev. Jimbeau Walsh"
medium_aliases: ["Jimbeau Walsh"]
medium_description: "Rev. Jimbeau Walsh is a father, musician, songwriter, composer, and singer, and a minister who has married over three thousand couples on the island of Oahu. He is also a Celestial Medium within the Divine Love community. His passion is praying in communion with God and the Celestial Angels, asking to be filled with and to live in Divine Love, and his mission is to share his channeled messages and songs and to offer others the opportunity to experience Divine Love through prayer, freely and open to all faiths. His path as a medium began with an openness to be filled with Divine Love through prayer after accepting an invitation to pray with the Divine Love community. He channeled his first Celestial message, from Paramahansa Yogananda, in 2019, and has since channeled messages from Yogananda and many other Celestial and progressing spirits. He co-hosts a weekly Divine Love prayer circle with Judy Dunbar."
