medium_name: "Maureen Cardoso"
medium_aliases: []
medium_description: >
  Maureen Cardoso is a trance medium, healer, teacher, and writer whose spiritual practice
  is rooted in Divine Love. Through her gifts of mediumship she serves as a conduit for
  Celestial Angels, bringing messages of guidance, truth, and wisdom grounded in Divine
  Love teachings. Her healing practice — offered both online and in person — allows
  Celestial beings to work through her, providing blessings of mental, emotional, and
  physical healing, love, and guidance. As a teacher, Maureen created the six-week online
  course Befriend Your Soul with G.R.A.C.E., designed to support soul awakening in Divine
  Love by helping students identify patterns and beliefs that no longer serve truth and
  happiness. Her background in yoga, meditation, and pranayam informs her understanding
  of spiritual and physical energy. Maureen collaborates widely with Divine Love
  practitioners, facilitating Circles of Light and soul development retreats across
  Australia, Germany, England, Barbados, Trinidad, Western Canada, and the United States.
  Her spiritual writings, including Befriend Your Soul with G.R.A.C.E., are intended for
  eventual publication.
