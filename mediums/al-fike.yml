medium_description: "Al Fike is a gifted medium, spiritual teacher, and author dedicated to sharing messages from the Celestial Heavens. An ordained minister with the Foundation Church of Divine Truth and co-founder of the Divine Love Sanctuary Foundation, he has committed his life to facilitating spirit communication and guiding others toward soul awakening. His journey into mediumship began through Barbara Davies, a powerful medium who recognized his spiritual gifts early on; though initially skeptical, Al experienced an undeniable stirring within as she introduced him to Divine Love and the reality of spirit communication, and she guided him to understand his innate ability as a healer and channel for Celestial messages. Over decades of prayer and mediumship his gift has deepened, allowing him to serve as a bridge between the material and spiritual worlds, sharing the wisdom, love, and guidance of Celestial beings with those seeking spiritual awakening around the world. He remains in close connection with the spirit world, receiving guidance from Celestial beings including his lifelong friend and mentor Barbara, who now resides in the Celestial Heavens. His mission is to bring forth messages of Divine Love, offering hope, healing, and transformation to all who seek a deeper connection with God and the spiritual realms."
