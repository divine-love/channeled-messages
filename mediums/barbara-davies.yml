medium_description: "Barbara Davies was a powerful medium who played an instrumental role in the development of Al Fike's mediumship, recognizing his spiritual gifts early on, introducing him to Divine Love and the reality of spirit communication, and guiding him to understand his innate ability as a healer and channel. She now resides in the Celestial Heavens and continues, as Al's lifelong friend and mentor, to be an important part of the Divine Love movement from the other side of the veil."
