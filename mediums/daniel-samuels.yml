medium_id: daniel-samuels
medium_name: "Daniel Samuels"
medium_aliases: ["Dr. Daniel G. Samuels", "Dr. Samuels"]
medium_description: "Dr. Daniel G. Samuels served as an instrument for receiving Divine Love messages, active between 1954 and 1966. He supplemented the foundational work of James Padgett, receiving a significant volume of messages from Jesus focusing on the New and Old Testaments — specifically detailing how Jesus came to understand his Messiahship and providing a corrected gospel account. His work is considered an important complement to the Padgett Messages."
